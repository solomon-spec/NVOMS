services:
  web:
    build: .
    command: gunicorn nvoms.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120
    ports:
      - "8000:8000"
    env_file: .env

  worker:
    build: .
    command: celery -A nvoms worker --loglevel=info
    env_file: .env

  beat:
    build: .
    command: celery -A nvoms beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
