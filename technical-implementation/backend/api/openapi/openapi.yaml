                  $ref: '#/components/schemas/PatientDetail'

  /api/v1/caregivers/me/patients/{patient_id}/schedule:
    get:
      tags: [Caregiver Self-Service]
      summary: Get vaccination schedule for one of my patients
      description: |
        Returns the vaccination schedule for a specific patient belonging to this caregiver.
        Enforces caregiver ownership — a 404 is returned if the patient is not assigned
        to the authenticated caregiver.
        **Roles:** CAREGIVER, ADMIN
      parameters:
        - in: path
          name: patient_id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Patient vaccination schedule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleSlot'
        '404':
