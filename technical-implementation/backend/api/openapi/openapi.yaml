openapi: 3.0.3
info:
  title: NVOMS API
  version: 1.0.0
  description: |
    **National Vaccination Outbreak Management System** – REST API

    This API powers the Ministry of Health Ethiopia's vaccination management platform.
    It covers patient registration, EPI immunization scheduling, vaccine batch tracking,
    AEFI surveillance, outbreak alerts, and report generation.

    All protected endpoints require a JWT Bearer token obtained from `/api/v1/auth/login`.

    **Roles**
    - `ADMIN` – full access to all resources
    - `HEALTH_WORKER` – patient management, immunization recording, surveillance reporting
    - `PUBLIC_HEALTH_OFFICIAL` – analytics, reports, geography, vaccine catalogue writes, alert management

servers:
  - url: http://localhost:8000
    description: Local development server

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Auth ──────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: health.worker@moh.et
        password:
          type: string
          format: password
          example: "S3cur3P@ss!"

    LoginResponse:
      type: object
      properties:
        access:
          type: string
          description: Short-lived JWT access token (15 min)
        refresh:
          type: string
          description: Long-lived JWT refresh token (7 days)
        user:
          $ref: '#/components/schemas/UserBrief'

    TokenRefreshRequest:
      type: object
      required: [refresh]
      properties:
        refresh:
          type: string

    TokenRefreshResponse:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
          format: password
        new_password:
          type: string
          format: password

    # ── Users ─────────────────────────────────────────────────────────────────
    UserBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [ADMIN, HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL]
        status:
          type: string
          enum: [ACTIVE, INACTIVE, DELETED]

    UserDetail:
      allOf:
        - $ref: '#/components/schemas/UserBrief'
        - type: object
          properties:
            phone_number:
              type: string
              nullable: true
            facility:
              $ref: '#/components/schemas/FacilityBrief'
            date_joined:
              type: string
              format: date-time

    UserCreateRequest:
      type: object
      required: [email, full_name, password, role]
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
        password:
          type: string
          format: password
        role:
          type: string
          enum: [ADMIN, HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL]
        phone_number:
          type: string
          nullable: true
        facility_id:
          type: string
          format: uuid
          nullable: true

    UserUpdateRequest:
      type: object
      properties:
        full_name:
          type: string
        phone_number:
          type: string
          nullable: true
        facility_id:
          type: string
          format: uuid
          nullable: true

    UserStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    UserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [ADMIN, HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL]

    # ── Facilities ────────────────────────────────────────────────────────────
    FacilityBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        facility_code:
          type: string
        facility_name:
          type: string
        facility_type:
          type: string

    FacilityDetail:
      allOf:
        - $ref: '#/components/schemas/FacilityBrief'
        - type: object
          properties:
            unit:
              $ref: '#/components/schemas/AdministrativeUnitBrief'
            address:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true
            is_active:
              type: boolean

    FacilityCreateRequest:
      type: object
      required: [facility_code, facility_name, facility_type]
      properties:
        facility_code:
          type: string
        facility_name:
          type: string
        facility_type:
          type: string
        unit_id:
          type: string
          format: uuid
          nullable: true
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true

    # ── Geography ─────────────────────────────────────────────────────────────
    AdministrativeUnitBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        unit_name:
          type: string
        unit_type:
          type: string
          enum: [region, zone, woreda, kebele]
        unit_code:
          type: string
          nullable: true

    AdministrativeUnitDetail:
      allOf:
        - $ref: '#/components/schemas/AdministrativeUnitBrief'
        - type: object
          properties:
            parent:
              $ref: '#/components/schemas/AdministrativeUnitBrief'
            is_active:
              type: boolean

    AdministrativeUnitCreateRequest:
      type: object
      required: [unit_name, unit_type]
      properties:
        unit_name:
          type: string
        unit_type:
          type: string
          enum: [region, zone, woreda, kebele]
        unit_code:
          type: string
          nullable: true
        parent_id:
          type: string
          format: uuid
          nullable: true

    # ── Caregivers ────────────────────────────────────────────────────────────
    CaregiverDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        phone_number:
          type: string
          nullable: true
        relationship:
          type: string
          nullable: true
        address:
          type: string
          nullable: true

    CaregiverCreateRequest:
      type: object
      required: [full_name]
      properties:
        full_name:
          type: string
        phone_number:
          type: string
          nullable: true
        relationship:
          type: string
          nullable: true
        address:
          type: string
          nullable: true

    # ── Patients ──────────────────────────────────────────────────────────────
    PatientBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        patient_uid:
          type: string
          example: PAT-A1B2C3D4E5
        full_name:
          type: string
        date_of_birth:
          type: string
          format: date
        sex:
          type: string
          enum: [M, F]
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    PatientDetail:
      allOf:
        - $ref: '#/components/schemas/PatientBrief'
        - type: object
          properties:
            mother_name:
              type: string
              nullable: true
            caregiver:
              $ref: '#/components/schemas/CaregiverDetail'
            facility:
              $ref: '#/components/schemas/FacilityBrief'
            unit:
              $ref: '#/components/schemas/AdministrativeUnitBrief'
            address:
              type: string
              nullable: true
            phone_number:
              type: string
              nullable: true
            registered_at:
              type: string
              format: date-time

    PatientCreateRequest:
      type: object
      required: [full_name, date_of_birth, sex]
      properties:
        full_name:
          type: string
        date_of_birth:
          type: string
          format: date
        sex:
          type: string
          enum: [M, F]
        mother_name:
          type: string
          nullable: true
        caregiver_id:
          type: string
          format: uuid
          nullable: true
        facility_id:
          type: string
          format: uuid
          nullable: true
        unit_id:
          type: string
          format: uuid
          nullable: true
        address:
          type: string
          nullable: true
        phone_number:
          type: string
          nullable: true

    PatientSummary:
      allOf:
        - $ref: '#/components/schemas/PatientDetail'
        - type: object
          properties:
            immunization_summary:
              type: object
              properties:
                total_scheduled:
                  type: integer
                administered:
                  type: integer
                overdue:
                  type: integer
                upcoming:
                  type: integer

    # ── Immunization Schedule ─────────────────────────────────────────────────
    ScheduleSlot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vaccine:
          $ref: '#/components/schemas/VaccineBrief'
        dose_label:
          type: string
        due_date:
          type: string
          format: date
        status:
          type: string
          enum: [scheduled, pending, due_soon, due_today, overdue, defaulter, administered, exempt, cancelled]
        status_reason:
          type: string
          nullable: true
        status_changed_at:
          type: string
          format: date-time
          nullable: true

    ScheduleSlotUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [scheduled, pending, due_soon, due_today, overdue, defaulter, administered, exempt, cancelled]
        status_reason:
          type: string
          nullable: true

    ImmunizationEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vaccine:
          $ref: '#/components/schemas/VaccineBrief'
        vaccine_batch:
          $ref: '#/components/schemas/VaccineBatchBrief'
        dose_number:
          type: integer
        administered_at:
          type: string
          format: date-time
        administered_by:
          $ref: '#/components/schemas/UserBrief'
        facility:
          $ref: '#/components/schemas/FacilityBrief'
        route_of_administration:
          type: string
          nullable: true
        site_of_administration:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        local_client_record_id:
          type: string
          nullable: true

    ImmunizationEventCreateRequest:
      type: object
      required: [vaccine_id, dose_number, administered_at]
      properties:
        vaccine_id:
          type: string
          format: uuid
        vaccine_batch_id:
          type: string
          format: uuid
          nullable: true
        dose_number:
          type: integer
          minimum: 1
        administered_at:
          type: string
          format: date-time
        facility_id:
          type: string
          format: uuid
          nullable: true
        route_of_administration:
          type: string
          nullable: true
        site_of_administration:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        local_client_record_id:
          type: string
          nullable: true
          description: Offline client record ID for deduplication when syncing from mobile

    # ── Antigens & Vaccines ───────────────────────────────────────────────────
    AntigenDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        is_active:
          type: boolean

    AntigenCreateRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true

    VaccineBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vaccine_code:
          type: string
        vaccine_name:
          type: string
        dose_sequence:
          type: integer
          nullable: true

    VaccineDetail:
      allOf:
        - $ref: '#/components/schemas/VaccineBrief'
        - type: object
          properties:
            antigen:
              $ref: '#/components/schemas/AntigenDetail'
            default_route:
              type: string
              nullable: true
            default_site:
              type: string
              nullable: true
            is_active:
              type: boolean

    VaccineCreateRequest:
      type: object
      required: [vaccine_code, vaccine_name, antigen_id]
      properties:
        vaccine_code:
          type: string
        vaccine_name:
          type: string
        antigen_id:
          type: string
          format: uuid
        dose_sequence:
          type: integer
          nullable: true
        default_route:
          type: string
          nullable: true
        default_site:
          type: string
          nullable: true

    VaccineBatchBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        batch_number:
          type: string
        expiry_date:
          type: string
          format: date

    VaccineBatchDetail:
      allOf:
        - $ref: '#/components/schemas/VaccineBatchBrief'
        - type: object
          properties:
            vaccine:
              $ref: '#/components/schemas/VaccineBrief'
            manufacturer_name:
              type: string
              nullable: true
            source_system:
              type: string
              nullable: true
            qty_on_hand:
              type: integer
              minimum: 0
              description: Current quantity of doses in stock
              example: 250
            is_valid:
              type: boolean
            created_at:
              type: string
              format: date-time

    VaccineBatchCreateRequest:
      type: object
      required: [vaccine_id, batch_number, expiry_date]
      properties:
        vaccine_id:
          type: string
          format: uuid
        batch_number:
          type: string
        manufacturer_name:
          type: string
          nullable: true
        expiry_date:
          type: string
          format: date
        source_system:
          type: string
          nullable: true
        qty_on_hand:
          type: integer
          minimum: 0
          default: 0
          description: Initial quantity of doses being added to stock
          example: 500
        is_valid:
          type: boolean
          default: true

    # ── EPI Schedule ──────────────────────────────────────────────────────────
    EpiScheduleRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vaccine:
          $ref: '#/components/schemas/VaccineBrief'
        dose_label:
          type: string
        recommended_age_days:
          type: integer
        grace_period_days:
          type: integer
        defaulter_threshold_days:
          type: integer
        is_birth_dose:
          type: boolean
        is_active:
          type: boolean

    EpiScheduleRuleCreateRequest:
      type: object
      required: [vaccine_id, dose_label, recommended_age_days]
      properties:
        vaccine_id:
          type: string
          format: uuid
        dose_label:
          type: string
        recommended_age_days:
          type: integer
          minimum: 0
        grace_period_days:
          type: integer
          default: 7
        defaulter_threshold_days:
          type: integer
          default: 28
        is_birth_dose:
          type: boolean
          default: false
        is_active:
          type: boolean
          default: true
        medical_exception_rule:
          type: object
          nullable: true

    EpiScheduleVersionBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        version_name:
          type: string
        effective_from:
          type: string
          format: date
        status:
          type: string
          enum: [draft, active, retired]

    EpiScheduleVersionDetail:
      allOf:
        - $ref: '#/components/schemas/EpiScheduleVersionBrief'
        - type: object
          properties:
            effective_to:
              type: string
              format: date
              nullable: true
            notes:
              type: string
              nullable: true
            created_by:
              $ref: '#/components/schemas/UserBrief'
            created_at:
              type: string
              format: date-time
            rules:
              type: array
              items:
                $ref: '#/components/schemas/EpiScheduleRule'

    EpiScheduleVersionCreateRequest:
      type: object
      required: [version_name, effective_from]
      properties:
        version_name:
          type: string
        effective_from:
          type: string
          format: date
        effective_to:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [draft, active, retired]
          default: draft
        notes:
          type: string
          nullable: true

    # ── Surveillance ──────────────────────────────────────────────────────────
    SurveillanceSymptom:
      type: object
      properties:
        symptom_code:
          type: string
        symptom_label:
          type: string
        is_present:
          type: boolean
        observation_value:
          type: string
          nullable: true

    SurveillanceReportBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category:
          type: string
          enum: [aefi, symptom, lab_follow_up]
        severity:
          type: string
          enum: [low, moderate, high, critical]
        status:
          type: string
          enum: [submitted, queued, under_follow_up, closed]
        patient:
          $ref: '#/components/schemas/PatientBrief'
        reported_at:
          type: string
          format: date-time

    SurveillanceReportDetail:
      allOf:
        - $ref: '#/components/schemas/SurveillanceReportBrief'
        - type: object
          properties:
            reported_by:
              $ref: '#/components/schemas/UserBrief'
            facility:
              $ref: '#/components/schemas/FacilityBrief'
            vaccine:
              $ref: '#/components/schemas/VaccineBrief'
            onset_date:
              type: string
              format: date
              nullable: true
            description:
              type: string
              nullable: true
            symptoms:
              type: array
              items:
                $ref: '#/components/schemas/SurveillanceSymptom'

    SurveillanceReportCreateRequest:
      type: object
      required: [category, severity, patient_id]
      properties:
        category:
          type: string
          enum: [aefi, symptom, lab_follow_up]
        severity:
          type: string
          enum: [low, moderate, high, critical]
        patient_id:
          type: string
          format: uuid
        vaccine_id:
          type: string
          format: uuid
          nullable: true
        facility_id:
          type: string
          format: uuid
          nullable: true
        onset_date:
          type: string
          format: date
          nullable: true
        description:
          type: string
          nullable: true
        symptoms:
          type: array
          items:
            $ref: '#/components/schemas/SurveillanceSymptom'

    SurveillanceReportUpdateRequest:
      type: object
      properties:
        severity:
          type: string
          enum: [low, moderate, high, critical]
        status:
          type: string
          enum: [submitted, queued, under_follow_up, closed]
        description:
          type: string
          nullable: true

    FollowUpActionDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        report:
          type: string
          format: uuid
        action_taken:
          type: string
        status:
          type: string
          enum: [open, completed]
        assigned_to:
          $ref: '#/components/schemas/UserBrief'
        due_date:
          type: string
          format: date
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          $ref: '#/components/schemas/UserBrief'
        created_at:
          type: string
          format: date-time

    FollowUpActionCreateRequest:
      type: object
      required: [action_taken]
      properties:
        action_taken:
          type: string
        assigned_to_id:
          type: string
          format: uuid
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true

    # ── Outbreak Alerts ───────────────────────────────────────────────────────
    OutbreakAlertDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        disease_code:
          type: string
        alert_source:
          type: string
          enum: [prediction, surveillance, manual]
        status:
          type: string
          enum: [potential, under_review, confirmed, dismissed, false_alarm]
        unit:
          $ref: '#/components/schemas/AdministrativeUnitBrief'
        risk_probability:
          type: number
          format: float
          nullable: true
        surveillance_report:
          type: string
          format: uuid
          nullable: true
        verified_by:
          $ref: '#/components/schemas/UserBrief'
        verified_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    AlertStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [under_review, confirmed, dismissed, false_alarm]
        notes:
          type: string
          nullable: true

    # ── Reports ───────────────────────────────────────────────────────────────
    ReportQueueRequest:
      type: object
      properties:
        output_format:
          type: string
          enum: [pdf, csv]
          default: pdf
        facility_id:
          type: string
          format: uuid
          nullable: true
        unit_id:
          type: string
          format: uuid
          nullable: true
        date_from:
          type: string
          format: date
          nullable: true
        date_to:
          type: string
          format: date
          nullable: true

    GeneratedReportDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        report_code:
          type: string
        report_name:
          type: string
        output_format:
          type: string
          enum: [pdf, csv]
        generation_status:
          type: string
          enum: [processing, completed, failed]
        parameter_payload:
          type: object
          nullable: true
        file_uri:
          type: string
          nullable: true
        requested_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    # ── Common ────────────────────────────────────────────────────────────────
    PaginatedList:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          format: uri
          nullable: true
        previous:
          type: string
          format: uri
          nullable: true
        results:
          type: array
          items: {}

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    ValidationErrorResponse:
      type: object
      additionalProperties:
        type: array
        items:
          type: string

    # ── Coverage Analytics ────────────────────────────────────────────────────
    VaccineCoverageRow:
      type: object
      properties:
        vaccine_id:
          type: string
          format: uuid
        vaccine_code:
          type: string
          example: BCG
        vaccine_name:
          type: string
          example: BCG Vaccine
        antigen_name:
          type: string
          example: Tuberculosis
        total_scheduled:
          type: integer
          description: Patients with a schedule slot for this vaccine (excluding cancelled/exempt)
        administered:
          type: integer
          description: Slots with status=administered
        overdue:
          type: integer
          description: Slots with status=overdue
        defaulter:
          type: integer
          description: Slots with status=defaulter
        upcoming:
          type: integer
          description: Slots with status in (scheduled, pending, due_soon, due_today)
        coverage_pct:
          type: number
          format: float
          description: administered / total_scheduled × 100
        missed_pct:
          type: number
          format: float
          description: (overdue + defaulter) / total_scheduled × 100

    VaccineCoverageResponse:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        filters:
          type: object
          properties:
            unit_id:
              type: string
              format: uuid
              nullable: true
            vaccine_id:
              type: string
              format: uuid
              nullable: true
            date_from:
              type: string
              format: date
              nullable: true
            date_to:
              type: string
              format: date
              nullable: true
        summary:
          type: object
          properties:
            total_scheduled:
              type: integer
            total_administered:
              type: integer
            overall_coverage_pct:
              type: number
              format: float
        vaccines:
          type: array
          items:
            $ref: '#/components/schemas/VaccineCoverageRow'

    RegionCoverageRow:
      type: object
      properties:
        region_id:
          type: string
          format: uuid
        region_name:
          type: string
        region_code:
          type: string
          nullable: true
        total_scheduled:
          type: integer
        administered:
          type: integer
        overdue_or_defaulter:
          type: integer
        coverage_pct:
          type: number
          format: float

    RegionCoverageResponse:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        filters:
          type: object
          properties:
            vaccine_id:
              type: string
              format: uuid
              nullable: true
            date_from:
              type: string
              format: date
              nullable: true
            date_to:
              type: string
              format: date
              nullable: true
        regions:
          type: array
          items:
            $ref: '#/components/schemas/RegionCoverageRow'

    # ── Offline / Sync ────────────────────────────────────────────────────────
    DeviceRegistration:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        device_label:
          type: string
        platform:
          type: string
        app_version:
          type: string
          nullable: true
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, disabled]

    DeviceRegistrationCreateRequest:
      type: object
      required: [device_label, platform]
      properties:
        device_label:
          type: string
          example: "Sumit's Tecno Pop 7"
        platform:
          type: string
          example: android
        app_version:
          type: string
          nullable: true
          example: "2.1.0"

    SyncBatchItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entity_type:
          type: string
          enum: [patient, immunization, surveillance_report, caregiver]
        operation_type:
          type: string
          enum: [insert, update]
        client_record_id:
          type: string
        server_record_id:
          type: string
          format: uuid
          nullable: true
        item_status:
          type: string
          enum: [pending, applied, conflict, rejected]
        conflict_reason:
          type: string
          nullable: true
        payload_checksum:
          type: string
          nullable: true
        payload:
          type: object
          nullable: true

    SyncBatchItemInput:
      type: object
      required: [entity_type, operation_type, client_record_id, payload]
      properties:
        entity_type:
          type: string
          enum: [patient, immunization, surveillance_report, caregiver]
        operation_type:
          type: string
          enum: [insert, update]
        client_record_id:
          type: string
          description: Client-side UUID or identifier for deduplication
        payload_checksum:
          type: string
          nullable: true
        payload:
          type: object
          description: Full JSON payload of the record to sync

    SyncBatch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [submitted, processed, conflict, rejected]
        submitted_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        record_count:
          type: integer
        conflict_count:
          type: integer

    SyncBatchSubmitRequest:
      type: object
      required: [device_id, items]
      properties:
        device_id:
          type: string
          format: uuid
          description: ID of the registered device submitting this batch
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SyncBatchItemInput'

    SyncBatchSubmitResponse:
      type: object
      properties:
        batch:
          $ref: '#/components/schemas/SyncBatch'
        items:
          type: array
          items:
            $ref: '#/components/schemas/SyncBatchItem'

    ConflictResolveRequest:
      type: object
      required: [resolution]
      properties:
        resolution:
          type: string
          enum: [keep_server, keep_client]
          description: keep_server discards the client change; keep_client applies the override_payload
        override_payload:
          type: object
          nullable: true
          description: Required when resolution=keep_client; the corrected record to apply

    SyncConfigResponse:
      type: object
      properties:
        max_batch_size:
          type: integer
          example: 500
        supported_entity_types:
          type: array
          items:
            type: string
        supported_operation_types:
          type: array
          items:
            type: string
        recommended_sync_interval_minutes:
          type: integer
          example: 30
        server_time:
          type: string
          format: date-time
        api_version:
          type: string
          example: "1.0"

    SyncReferenceDataResponse:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        antigens:
          type: array
          items:
            $ref: '#/components/schemas/AntigenDetail'
        vaccines:
          type: array
          items:
            $ref: '#/components/schemas/VaccineDetail'
        active_epi_schedule:
          $ref: '#/components/schemas/EpiScheduleVersionDetail'
        administrative_units:
          type: array
          items:
            $ref: '#/components/schemas/AdministrativeUnitDetail'
        facilities:
          type: array
          items:
            $ref: '#/components/schemas/FacilityBrief'

    # ── Dashboards & Reports ──────────────────────────────────────────────────

    AdminDashboard:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        total_patients:
          type: integer
          example: 1240
        total_users:
          type: integer
          example: 38
        active_defaulters:
          type: integer
          example: 92
        defaulter_pct:
          type: number
          format: float
          example: 7.4
        users_by_role:
          type: array
          items:
            type: object
            properties:
              role_code:
                type: string
                example: HEALTH_WORKER
              role_name:
                type: string
                example: Health Worker
              count:
                type: integer
                example: 24

    HwDashboard:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        report_date:
          type: string
          format: date
        facility_id:
          type: string
          format: uuid
          nullable: true
        facility_name:
          type: string
          nullable: true
          example: Bole Health Center
        total_patients:
          type: integer
          example: 320
        upcoming_today:
          type: integer
          example: 14
        daily_doses_administered:
          type: integer
          example: 9
        defaulter_count:
          type: integer
          example: 22
        defaulter_list:
          type: array
          items:
            $ref: '#/components/schemas/DefaulterPatient'

    PhoDashboard:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        total_patients:
          type: integer
          example: 5400
        total_doses_administered:
          type: integer
          example: 18920
        active_defaulters:
          type: integer
          example: 312
        defaulter_pct:
          type: number
          format: float
          example: 5.8
        zero_dose_children:
          type: integer
          example: 41

    DailyVaccinationReport:
      type: object
      properties:
        report_date:
          type: string
          format: date
        facility_id:
          type: string
          format: uuid
          nullable: true
        facility_name:
          type: string
          nullable: true
        total_doses:
          type: integer
          example: 47
        by_vaccine:
          type: array
          items:
            type: object
            properties:
              vaccine_code:
                type: string
                example: PENTA1
              vaccine_name:
                type: string
                example: Pentavalent Dose 1
              antigen_name:
                type: string
                example: Diphtheria/Pertussis/Tetanus
              doses_administered:
                type: integer
                example: 12

    DefaulterPatient:
      type: object
      properties:
        patient_id:
          type: string
          format: uuid
        uid:
          type: string
          example: PAT-AA001
        full_name:
          type: string
          example: Liya Tesfaye
        date_of_birth:
          type: string
          format: date
        sex:
          type: string
          enum: [male, female, other, unknown]
        caregiver_name:
          type: string
          example: Selam Tesfaye
        caregiver_phone:
          type: string
          example: "+251912111001"
        residence_unit:
          type: string
          nullable: true
          example: Bole Woreda 01
        facility:
          type: string
          nullable: true
          example: Bole Health Center
        current_status:
          type: string
          enum: [overdue, defaulter]
        overdue_count:
          type: integer
          example: 3
        next_due_date:
          type: string
          format: date
          nullable: true

    ReminderQueued:
      type: object
      properties:
        notification_id:
          type: string
          format: uuid
        phone_number:
          type: string
          example: "+251912111001"
        message_body:
          type: string
          example: "Dear Selam Tesfaye, Liya has missed scheduled vaccinations..."
        status:
          type: string
          enum: [queued]

    # ── Notifications ─────────────────────────────────────────────────────────

    MessageTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        template_code:
          type: string
          example: reminder_en_v1
        channel:
          type: string
          enum: [sms]
          example: sms
        message_type:
          type: string
          enum: [reminder, missed_appointment, outbreak_warning, welcome, manual]
          example: reminder
        language_code:
          type: string
          example: en
        template_body:
          type: string
          description: Message text with {placeholders} e.g. {caregiver_name}, {patient_name}, {vaccine_name}, {due_date}, {facility_name}
          example: "Dear {caregiver_name}, {patient_name} is due for {vaccine_name} TODAY ({due_date}). Please visit your nearest health facility. - NVOMS"
        is_active:
          type: boolean
          example: true

    NotificationAttempt:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        attempt_number:
          type: integer
          example: 1
        attempted_at:
          type: string
          format: date-time
          readOnly: true
        gateway_status_code:
          type: string
          nullable: true
          example: "200"
        gateway_response:
          type: string
          nullable: true
          example: '[{"id":"abc123","state":"Pending"}]'
        attempt_status:
          type: string
          enum: [sent, delivered, failed, retrying]
          example: sent

    SmsNotification:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        notification_type:
          type: string
          enum: [reminder, missed_appointment, outbreak_warning, welcome, manual]
          example: reminder
        phone_number:
          type: string
          example: "+251911000000"
        language_code:
          type: string
          example: en
        message_body:
          type: string
          example: "Dear Abebe, your child Kebede is due for BCG vaccination TODAY (2025-01-15). Please visit your nearest health facility. - NVOMS"
        priority:
          type: integer
          minimum: 1
          maximum: 5
          example: 1
        status:
          type: string
          enum: [queued, sent, delivered, pending_retry, failed, cancelled]
          readOnly: true
          example: sent
        caregiver:
          type: string
          format: uuid
        patient:
          type: string
          format: uuid
          nullable: true
        schedule_slot:
          type: string
          format: uuid
          nullable: true
        outbreak_alert:
          type: string
          format: uuid
          nullable: true
        gateway_message_id:
          type: string
          nullable: true
          readOnly: true
        retry_count:
          type: integer
          readOnly: true
          example: 0
        last_error:
          type: string
          nullable: true
          readOnly: true
        scheduled_for:
          type: string
          format: date-time
          nullable: true
        sent_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        attempts:
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/NotificationAttempt'

    SmsNotificationListItem:
      type: object
      description: Lightweight notification summary (no attempt history)
      properties:
        id:
          type: string
          format: uuid
        notification_type:
          type: string
          enum: [reminder, missed_appointment, outbreak_warning, welcome, manual]
        phone_number:
          type: string
        status:
          type: string
          enum: [queued, sent, delivered, pending_retry, failed, cancelled]
        caregiver:
          type: string
          format: uuid
        patient:
          type: string
          format: uuid
          nullable: true
        scheduled_for:
          type: string
          format: date-time
          nullable: true
        sent_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    SmsNotificationCreateRequest:
      type: object
      required: [caregiver_id, notification_type, message_body]
      properties:
        caregiver_id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
          nullable: true
        schedule_slot_id:
          type: string
          format: uuid
          nullable: true
        notification_type:
          type: string
          enum: [reminder, missed_appointment, outbreak_warning, welcome, manual]
          example: manual
        message_body:
          type: string
          example: "Reminder: please visit your nearest health facility."
        language_code:
          type: string
          default: en
          example: en
        priority:
          type: integer
          minimum: 1
          maximum: 5
          default: 1
          example: 1
        scheduled_for:
          type: string
          format: date-time
          nullable: true
          description: When null or omitted, the message is dispatched at the next scheduled worker run

    DeliveryStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [sent, delivered, failed, cancelled]
          example: delivered
        gateway_message_id:
          type: string
          nullable: true
          example: abc-123-xyz
        last_error:
          type: string
          nullable: true

# ══════════════════════════════════════════════════════════════════════════════
# PATHS
# ══════════════════════════════════════════════════════════════════════════════
paths:

  # ── Authentication ──────────────────────────────────────────────────────────

  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: Obtain JWT token pair
      description: |
        Authenticates a user with email and password and returns a short-lived access token
        and a long-lived refresh token. The access token must be included as a Bearer token
        in the `Authorization` header of all subsequent requests.
        **Roles:** Public (no token required)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a new access+refresh token pair using
        token rotation. The old refresh token is blacklisted after use, preventing replay.
        **Roles:** Public (no token required)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
        '401':
          description: Refresh token invalid or blacklisted

  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      summary: Logout current session
      description: |
        Blacklists the provided refresh token, invalidating the current session.
        The access token remains valid until it naturally expires (15 min).
        **Roles:** ADMIN, HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: Logged out successfully
        '401':
          description: Not authenticated

  /api/v1/auth/logout-all:
    post:
      tags: [Authentication]
      summary: Logout all sessions
      description: |
        Invalidates all outstanding refresh tokens for the authenticated user.
        Useful for security incidents or when a device is lost.
        **Roles:** ADMIN, HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL
      responses:
        '200':
          description: All sessions invalidated
        '401':
          description: Not authenticated

  /api/v1/auth/me:
    get:
      tags: [Authentication]
      summary: Get current user profile
      description: |
        Returns the authenticated user's own profile, including their role and assigned facility.
        Used by client applications to initialise the UI with correct permissions.
        **Roles:** ADMIN, HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'

  /api/v1/auth/change-password:
    post:
      tags: [Authentication]
      summary: Change own password
      description: |
        Allows an authenticated user to change their own password by providing their
        current password for verification. Invalidates all existing sessions after success.
        **Roles:** ADMIN, HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed; all sessions invalidated
        '400':
          description: Old password incorrect or new password too weak

  # ── Users ───────────────────────────────────────────────────────────────────

  /api/v1/users/:
    get:
      tags: [Users]
      summary: List all users
      description: |
        Returns a paginated list of system users. Supports filtering by role and status.
        Used by administrators to manage accounts across all facilities.
        **Roles:** ADMIN
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [ADMIN, HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL]
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, DELETED]
        - in: query
          name: search
          schema:
            type: string
          description: Filter by name or email
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedList'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/UserDetail'
    post:
      tags: [Users]
      summary: Create a new user
      description: |
        Creates a new system user account and assigns them to a role and optionally a facility.
        New accounts are active immediately. Passwords must meet complexity requirements.
        **Roles:** ADMIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          description: Validation error (duplicate email, weak password)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      description: Returns full profile of a specific user. **Roles:** ADMIN
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '404':
          description: User not found
    patch:
      tags: [Users]
      summary: Update user profile
      description: Partially updates a user's profile fields. **Roles:** ADMIN
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '404':
          description: User not found
    delete:
      tags: [Users]
      summary: Soft-delete user
      description: |
        Marks the user as DELETED and deactivates their account.
        The user cannot log in after deletion. This is a soft delete — records are retained.
        **Roles:** ADMIN
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '204':
          description: User deleted

  /api/v1/users/{id}/status:
    patch:
      tags: [Users]
      summary: Activate or deactivate user
      description: |
        Toggles a user's status between ACTIVE and INACTIVE without deleting them.
        Used to temporarily suspend access (e.g., while on leave) without removing the account.
        **Roles:** ADMIN
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserStatusRequest'
      responses:
        '200':
          description: Status updated
        '404':
          description: User not found

  /api/v1/users/{id}/role:
    patch:
      tags: [Users]
      summary: Change user role
      description: |
        Reassigns a user to a different system role. Role changes take effect immediately —
        the user's next request will be evaluated against the new role.
        **Roles:** ADMIN
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleRequest'
      responses:
        '200':
          description: Role updated
        '404':
          description: User not found

  # ── Facilities ──────────────────────────────────────────────────────────────

  /api/v1/users/facilities/:
    get:
      tags: [Facilities]
      summary: List health facilities
      description: |
        Returns all registered health facilities with optional filtering by unit or type.
        Used by health workers during patient registration and immunization recording
        to select the correct service delivery point.
        **Roles:** All authenticated users
      parameters:
        - in: query
          name: unit_id
          schema:
            type: string
            format: uuid
        - in: query
          name: facility_type
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          description: Facility list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FacilityDetail'
    post:
      tags: [Facilities]
      summary: Register a new facility
      description: |
        Registers a new health facility in the system. Facilities are linked to an
        administrative unit (woreda/kebele) and serve as the primary data collection point.
        **Roles:** ADMIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityCreateRequest'
      responses:
        '201':
          description: Facility created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityDetail'

  /api/v1/users/facilities/{id}:
    get:
      tags: [Facilities]
      summary: Get facility by ID
      description: Returns a single facility's full details. **Roles:** All authenticated users
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Facility detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityDetail'
        '404':
          description: Facility not found
    put:
      tags: [Facilities]
      summary: Update facility
      description: Updates all fields of a facility record. **Roles:** ADMIN
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityCreateRequest'
      responses:
        '200':
          description: Updated facility
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityDetail'
    delete:
      tags: [Facilities]
      summary: Deactivate facility
      description: Soft-deletes a facility by setting is_active=false. **Roles:** ADMIN
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '204':
          description: Facility deactivated

  # ── Geography ───────────────────────────────────────────────────────────────

  /api/v1/geography/:
    get:
      tags: [Geography]
      summary: List administrative units
      description: |
        Returns the administrative hierarchy (region → zone → woreda → kebele).
        Used to populate location selectors throughout the system and to scope reports
        and outbreak alerts to specific geographic areas.
        **Roles:** All authenticated users
      parameters:
        - in: query
          name: unit_type
          schema:
            type: string
            enum: [region, zone, woreda, kebele]
        - in: query
          name: parent_id
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of administrative units
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdministrativeUnitDetail'
    post:
      tags: [Geography]
      summary: Create administrative unit
      description: |
        Adds a new administrative division to the geographic hierarchy.
        Required when new woredas or kebeles are created by the government.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdministrativeUnitCreateRequest'
      responses:
        '201':
          description: Administrative unit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdministrativeUnitDetail'

  /api/v1/geography/{id}:
    get:
      tags: [Geography]
      summary: Get administrative unit
      description: Returns a single administrative unit with its parent. **Roles:** All authenticated users
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Administrative unit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdministrativeUnitDetail'
        '404':
          description: Not found
    put:
      tags: [Geography]
      summary: Update administrative unit
      description: Replaces all fields of an administrative unit. **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdministrativeUnitCreateRequest'
      responses:
        '200':
          description: Updated unit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdministrativeUnitDetail'
    delete:
      tags: [Geography]
      summary: Deactivate administrative unit
      description: Soft-deletes a unit (is_active=false). Linked records are retained. **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '204':
          description: Unit deactivated

  # ── Caregivers ──────────────────────────────────────────────────────────────

  /api/v1/caregivers/:
    get:
      tags: [Caregivers]
      summary: List caregivers
      description: |
        Returns caregivers registered in the system. Supports search by name or phone number.
        Caregivers are guardians or parents linked to child patients; correct caregiver data
        enables recall notifications to reach the right contact.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Filter by full name or phone number
      responses:
        '200':
          description: Caregiver list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CaregiverDetail'
    post:
      tags: [Caregivers]
      summary: Register caregiver
      description: |
        Creates a new caregiver record. Typically done during first child registration.
        A caregiver can be linked to multiple patients.
        **Roles:** ADMIN, HEALTH_WORKER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaregiverCreateRequest'
      responses:
        '201':
          description: Caregiver created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaregiverDetail'

  /api/v1/caregivers/{id}:
    get:
      tags: [Caregivers]
      summary: Get caregiver
      description: Returns a single caregiver's full details. **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Caregiver detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaregiverDetail'
        '404':
          description: Not found
    put:
      tags: [Caregivers]
      summary: Update caregiver
      description: Updates caregiver contact details. **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaregiverCreateRequest'
      responses:
        '200':
          description: Updated caregiver
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaregiverDetail'

  # ── Patients ────────────────────────────────────────────────────────────────

  /api/v1/patients/:
    get:
      tags: [Patients]
      summary: List patients
      description: |
        Returns a paginated list of patients with optional filtering by name, status, or facility.
        Used by health workers at the point of care to locate an existing patient before
        recording an immunization event or updating a schedule.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Filter by name or patient UID
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE]
        - in: query
          name: facility_id
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated patient list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedList'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/PatientBrief'
    post:
      tags: [Patients]
      summary: Register patient
      description: |
        Registers a new patient and auto-generates a unique patient UID (PAT-XXXXXXXX).
        Also initialises a `PatientImmunizationStatus` summary record so that coverage
        queries don't need to aggregate from scratch.
        **Roles:** ADMIN, HEALTH_WORKER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreateRequest'
      responses:
        '201':
          description: Patient registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientDetail'
        '400':
          description: Validation error

  /api/v1/patients/{id}:
    get:
      tags: [Patients]
      summary: Get patient
      description: Returns a patient's full registration details. **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Patient detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientDetail'
        '404':
          description: Not found
    put:
      tags: [Patients]
      summary: Update patient
      description: Replaces all updatable fields of a patient record. **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreateRequest'
      responses:
        '200':
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientDetail'
    patch:
      tags: [Patients]
      summary: Partially update patient
      description: Updates only provided fields. Useful for correcting a single field. **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreateRequest'
      responses:
        '200':
          description: Updated patient
    delete:
      tags: [Patients]
      summary: Deactivate patient
      description: |
        Soft-deletes a patient by setting status=INACTIVE. The patient is excluded from
        active lists and reports but their immunization history is retained for audit purposes.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '204':
          description: Patient deactivated

  /api/v1/patients/{id}/summary:
    get:
      tags: [Patients]
      summary: Get patient immunization summary
      description: |
        Returns the patient's demographic record combined with a high-level immunization
        coverage summary (counts of scheduled, administered, overdue, and upcoming doses).
        Used on the patient dashboard to give a quick health worker an at-a-glance view.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Patient with immunization summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientSummary'

  /api/v1/patients/{id}/schedule:
    get:
      tags: [Immunization Schedule]
      summary: List patient's vaccination schedule
      description: |
        Returns all scheduled vaccination slots for the patient, ordered by due date.
        Each slot shows which vaccine is due, when, and the current delivery status.
        Used by the health worker at the point of care to determine which vaccines to administer.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Vaccination schedule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleSlot'

  /api/v1/patients/{id}/schedule/regenerate:
    post:
      tags: [Immunization Schedule]
      summary: Regenerate patient schedule
      description: |
        Re-derives the patient's vaccination schedule from the currently active EPI schedule
        version and the patient's date of birth. Uses `get_or_create` so existing slots are
        not duplicated. Call this when a new EPI schedule is activated or after correcting a
        patient's date of birth.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Schedule regenerated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleSlot'
        '400':
          description: No active EPI schedule version found

  /api/v1/patients/{id}/schedule/{slot_id}:
    get:
      tags: [Immunization Schedule]
      summary: Get schedule slot
      description: Returns a single vaccination slot. **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
        - in: path
          name: slot_id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Schedule slot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleSlot'
    put:
      tags: [Immunization Schedule]
      summary: Update schedule slot status
      description: |
        Updates the status of a vaccination slot (e.g., marking it as `exempt` or `cancelled`)
        and automatically creates a `ScheduleStatusEvent` audit record when the status changes.
        This audit trail is required for WHO reporting on defaulter tracking.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
        - in: path
          name: slot_id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleSlotUpdateRequest'
      responses:
        '200':
          description: Slot updated with audit event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleSlot'

  /api/v1/patients/{id}/doses:
    get:
      tags: [Immunization Schedule]
      summary: List immunization events for patient
      description: |
        Returns all vaccine doses administered to a patient, newest first.
        Used to build the patient's immunization card and to detect duplicate administration.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Immunization history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImmunizationEvent'
    post:
      tags: [Immunization Schedule]
      summary: Record a vaccine dose
      description: |
        Creates an immunization event recording that a specific dose was administered to the
        patient. The `administered_by` field is automatically set from the authenticated user.
        Supports an optional `local_client_record_id` for offline-first mobile clients to
        prevent duplicate records when syncing.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImmunizationEventCreateRequest'
      responses:
        '201':
          description: Dose recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImmunizationEvent'

  # ── Antigens ────────────────────────────────────────────────────────────────

  /api/v1/antigens/:
    get:
      tags: [Vaccine Catalogue]
      summary: List antigens
      description: |
        Returns all disease antigens targeted by the national immunization programme.
        The antigen catalogue is the top-level reference used to group related vaccine products.
        **Roles:** All authenticated users
      responses:
        '200':
          description: Antigen list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AntigenDetail'
    post:
      tags: [Vaccine Catalogue]
      summary: Create antigen
      description: |
        Adds a new disease antigen to the catalogue. Required when the EPI programme
        expands to cover a new disease (e.g., adding HPV or COVID-19).
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AntigenCreateRequest'
      responses:
        '201':
          description: Antigen created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AntigenDetail'

  /api/v1/antigens/{id}:
    get:
      tags: [Vaccine Catalogue]
      summary: Get antigen
      description: Returns a single antigen record. **Roles:** All authenticated users
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Antigen detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AntigenDetail'
        '404':
          description: Not found
    put:
      tags: [Vaccine Catalogue]
      summary: Update antigen
      description: Replaces all fields of an antigen record. **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AntigenCreateRequest'
      responses:
        '200':
          description: Updated antigen
    delete:
      tags: [Vaccine Catalogue]
      summary: Deactivate antigen
      description: Soft-deletes an antigen (is_active=false). **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '204':
          description: Antigen deactivated

  # ── Vaccines ────────────────────────────────────────────────────────────────

  /api/v1/vaccines/:
    get:
      tags: [Vaccine Catalogue]
      summary: List vaccines
      description: |
        Returns all vaccine products in the national catalogue. Each vaccine is linked to
        an antigen and carries dose sequence information used when building immunization schedules.
        **Roles:** All authenticated users
      parameters:
        - in: query
          name: antigen_id
          schema:
            type: string
            format: uuid
        - in: query
          name: is_active
          schema:
            type: boolean
      responses:
        '200':
          description: Vaccine list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VaccineDetail'
    post:
      tags: [Vaccine Catalogue]
      summary: Register vaccine product
      description: |
        Adds a new vaccine product to the catalogue. Required when a new formulation,
        brand, or combination vaccine is introduced to the national programme.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaccineCreateRequest'
      responses:
        '201':
          description: Vaccine registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaccineDetail'

  /api/v1/vaccines/{id}:
    get:
      tags: [Vaccine Catalogue]
      summary: Get vaccine
      description: Returns a single vaccine product with its linked antigen. **Roles:** All authenticated users
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Vaccine detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaccineDetail'
        '404':
          description: Not found
    put:
      tags: [Vaccine Catalogue]
      summary: Update vaccine
      description: Replaces all fields of a vaccine product. **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaccineCreateRequest'
      responses:
        '200':
          description: Updated vaccine
    delete:
      tags: [Vaccine Catalogue]
      summary: Deactivate vaccine
      description: Soft-deletes a vaccine product. **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '204':
          description: Vaccine deactivated

  # ── Vaccine Batches ─────────────────────────────────────────────────────────

  /api/v1/vaccines/batches/:
    get:
      tags: [Vaccine Batches]
      summary: List vaccine batches
      description: |
        Returns all vaccine batch records. Health workers use this to identify valid
        batches and verify expiry dates before administration. Batch traceability is
        required for AEFI investigation to link adverse events to specific lots.
        **Roles:** All authenticated users
      parameters:
        - in: query
          name: vaccine_id
          schema:
            type: string
            format: uuid
        - in: query
          name: is_valid
          schema:
            type: boolean
      responses:
        '200':
          description: Batch list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VaccineBatchDetail'
    post:
      tags: [Vaccine Batches]
      summary: Register vaccine batch
      description: |
        Records a new vaccine batch received at a facility. Batch registration is the
        prerequisite for linking an immunization event to a specific lot, enabling
        downstream pharmacovigilance and cold-chain monitoring.
        **Roles:** ADMIN, HEALTH_WORKER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaccineBatchCreateRequest'
      responses:
        '201':
          description: Batch registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaccineBatchDetail'

  /api/v1/vaccines/batches/{id}:
    get:
      tags: [Vaccine Batches]
      summary: Get vaccine batch
      description: Returns a single batch record. **Roles:** All authenticated users
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Batch detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaccineBatchDetail'
        '404':
          description: Not found
    put:
      tags: [Vaccine Batches]
      summary: Update batch
      description: Updates batch details (e.g., mark invalid after quality failure). **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaccineBatchCreateRequest'
      responses:
        '200':
          description: Updated batch
    delete:
      tags: [Vaccine Batches]
      summary: Remove batch record
      description: Permanently removes a batch record. Use with caution — prefer marking is_valid=false. **Roles:** ADMIN
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '204':
          description: Batch deleted

  # ── EPI Schedule Versions ───────────────────────────────────────────────────

  /api/v1/vaccines/schedules/:
    get:
      tags: [EPI Schedule]
      summary: List EPI schedule versions
      description: |
        Returns all versions of the national EPI (Expanded Programme on Immunization) schedule.
        Multiple versions may exist (draft/active/retired). Only one active version is used
        to generate patient vaccination schedules at any given time.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, active, retired]
      responses:
        '200':
          description: Schedule version list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EpiScheduleVersionBrief'
    post:
      tags: [EPI Schedule]
      summary: Create EPI schedule version
      description: |
        Creates a new EPI schedule version in draft status. Draft versions do not affect
        patient schedules until activated. Used when the Ministry of Health updates the
        national immunization calendar.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpiScheduleVersionCreateRequest'
      responses:
        '201':
          description: Schedule version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpiScheduleVersionBrief'

  /api/v1/vaccines/schedules/{id}:
    get:
      tags: [EPI Schedule]
      summary: Get EPI schedule version with rules
      description: Returns a version with its full list of schedule rules. **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Schedule version detail including rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpiScheduleVersionDetail'
        '404':
          description: Not found
    put:
      tags: [EPI Schedule]
      summary: Update EPI schedule version
      description: Updates version metadata (name, dates, status). **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpiScheduleVersionCreateRequest'
      responses:
        '200':
          description: Updated version

  # ── EPI Schedule Rules ──────────────────────────────────────────────────────

  /api/v1/vaccines/schedules/{version_id}/rules/:
    get:
      tags: [EPI Schedule]
      summary: List rules for a schedule version
      description: |
        Returns all dose rules for a specific EPI schedule version. Each rule defines
        when a vaccine dose is recommended (by age in days), grace periods, and defaulter
        thresholds, and is the source of truth for schedule generation.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: version_id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Rule list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EpiScheduleRule'
    post:
      tags: [EPI Schedule]
      summary: Add rule to schedule version
      description: |
        Adds a new dose rule to a schedule version. Each rule is uniquely identified by
        version + vaccine + dose_label. Should only be applied to draft versions.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: version_id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpiScheduleRuleCreateRequest'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpiScheduleRule'

  /api/v1/vaccines/schedules/{version_id}/rules/{id}:
    get:
      tags: [EPI Schedule]
      summary: Get schedule rule
      description: Returns a single schedule rule. **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: version_id
          schema:
            type: string
            format: uuid
          required: true
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Schedule rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpiScheduleRule'
    put:
      tags: [EPI Schedule]
      summary: Update schedule rule
      description: Replaces all fields of a schedule rule. **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: version_id
          schema:
            type: string
            format: uuid
          required: true
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpiScheduleRuleCreateRequest'
      responses:
        '200':
          description: Updated rule
    delete:
      tags: [EPI Schedule]
      summary: Delete schedule rule
      description: Removes a rule from a schedule version. Should only be done on draft versions. **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: version_id
          schema:
            type: string
            format: uuid
          required: true
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '204':
          description: Rule deleted

  # ── Surveillance ─────────────────────────────────────────────────────────────

  /api/v1/surveillance/:
    get:
      tags: [Surveillance]
      summary: List surveillance reports
      description: |
        Returns submitted AEFI (Adverse Events Following Immunization) and symptom surveillance
        reports. These reports are the primary source for detecting safety signals and potential
        outbreak precursors. Supports filtering by category, severity, and status.
        **Roles:** ADMIN, HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: query
          name: category
          schema:
            type: string
            enum: [aefi, symptom, lab_follow_up]
        - in: query
          name: severity
          schema:
            type: string
            enum: [low, moderate, high, critical]
        - in: query
          name: status
          schema:
            type: string
            enum: [submitted, queued, under_follow_up, closed]
      responses:
        '200':
          description: Surveillance report list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SurveillanceReportBrief'
    post:
      tags: [Surveillance]
      summary: Submit surveillance report
      description: |
        Creates a new AEFI or symptom report submitted by a health worker at the facility.
        Supports structured symptom data for standardised signal detection. Once submitted,
        public health officials review and assign follow-up actions.
        **Roles:** ADMIN, HEALTH_WORKER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SurveillanceReportCreateRequest'
      responses:
        '201':
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SurveillanceReportDetail'

  /api/v1/surveillance/{id}:
    get:
      tags: [Surveillance]
      summary: Get surveillance report
      description: Returns full detail of a surveillance report including symptoms and follow-ups. **Roles:** ADMIN, HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Surveillance report detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SurveillanceReportDetail'
        '404':
          description: Not found
    patch:
      tags: [Surveillance]
      summary: Update surveillance report
      description: |
        Partially updates a report's severity, status, or description.
        Used by public health officials to escalate severity or close resolved cases.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SurveillanceReportUpdateRequest'
      responses:
        '200':
          description: Updated report

  /api/v1/surveillance/{id}/follow-ups:
    get:
      tags: [Surveillance]
      summary: List follow-up actions for report
      description: |
        Returns all follow-up actions assigned to a surveillance report.
        Follow-ups track the field investigation workflow — who is assigned,
        what was done, and when the case can be closed.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Follow-up actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FollowUpActionDetail'
    post:
      tags: [Surveillance]
      summary: Assign follow-up action
      description: |
        Assigns a new follow-up action to a surveillance report. Automatically transitions
        the report status to `under_follow_up` if it was previously `submitted`.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowUpActionCreateRequest'
      responses:
        '201':
          description: Follow-up assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowUpActionDetail'

  # ── Outbreak Alerts ─────────────────────────────────────────────────────────

  /api/v1/alerts/:
    get:
      tags: [Outbreak Alerts]
      summary: List outbreak alerts
      description: |
        Returns all outbreak alerts including those generated by the prediction model,
        raised from surveillance reports, or created manually. The alert feed is the
        primary situational awareness tool for public health officials monitoring
        potential outbreaks across regions.
        **Roles:** All authenticated users
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [potential, under_review, confirmed, dismissed, false_alarm]
        - in: query
          name: disease_code
          schema:
            type: string
        - in: query
          name: unit_id
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Alert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OutbreakAlertDetail'

  /api/v1/alerts/{id}/status:
    post:
      tags: [Outbreak Alerts]
      summary: Update alert status
      description: |
        Transitions an outbreak alert through its lifecycle (potential → under_review →
        confirmed / dismissed / false_alarm). Enforces a valid state machine — invalid
        transitions return 400. Sets `verified_by` and `verified_at` on terminal states.
        Required for the formal outbreak response workflow mandated by the MoH.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertStatusUpdateRequest'
      responses:
        '200':
          description: Alert status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutbreakAlertDetail'
        '400':
          description: Invalid status transition
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  # ── Reports ─────────────────────────────────────────────────────────────────

  /api/v1/reports/defaulters:
    post:
      tags: [Reports]
      summary: Queue defaulter list report
      description: |
        Queues generation of a defaulter list report — a list of patients who have missed
        one or more scheduled vaccinations within the selected facility or administrative unit.
        The report is generated asynchronously; poll the download endpoint with the returned
        job ID. Used by health officials to target community outreach and reduce drop-out.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportQueueRequest'
      responses:
        '202':
          description: Report queued — poll download endpoint for status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedReportDetail'

  /api/v1/reports/coverage:
    post:
      tags: [Reports]
      summary: Queue vaccination coverage report
      description: |
        Queues a coverage report that calculates the percentage of the target population
        that has received each antigen dose within the selected period and geographic scope.
        Used for EPI performance monitoring and national reporting to WHO/UNICEF.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportQueueRequest'
      responses:
        '202':
          description: Report queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedReportDetail'

  /api/v1/reports/aefi:
    post:
      tags: [Reports]
      summary: Queue AEFI surveillance report
      description: |
        Queues an AEFI (Adverse Events Following Immunization) surveillance report that
        aggregates all adverse event reports submitted by health workers in the selected
        scope and period. Used by pharmacovigilance officers to detect safety signals
        and submit data to national drug regulatory authorities.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportQueueRequest'
      responses:
        '202':
          description: Report queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedReportDetail'

  /api/v1/reports/{job_id}/download:
    get:
      tags: [Reports]
      summary: Check report status or download
      description: |
        Polls the status of a queued report job. Returns 202 while processing,
        410 if generation failed, and 200 with a `file_uri` when completed.
        This async polling pattern decouples long-running report generation
        from the HTTP connection, supporting large datasets without timeouts.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL (must be the requester)
      parameters:
        - in: path
          name: job_id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Report completed — file_uri contains the download link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedReportDetail'
        '202':
          description: Report is still processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: processing
                  job_id:
                    type: string
                    format: uuid
        '404':
          description: Job not found or does not belong to the requesting user
        '410':
          description: Report generation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: failed
                  job_id:
                    type: string
                    format: uuid

  # ── Vaccine Coverage Analytics ─────────────────────────────────────────────

  /api/v1/analytics/coverage/:
    get:
      tags: [Analytics]
      summary: Vaccine coverage per vaccine (national or scoped)
      description: |
        Returns vaccination coverage statistics broken down by vaccine.
        For each vaccine in the national EPI programme, reports how many patients are
        scheduled, how many have been administered, how many are overdue or defaulters,
        how many have upcoming appointments, and the resulting coverage percentage.

        This is the primary metric used by the Ministry of Health and WHO/UNICEF to
        evaluate EPI programme performance. Can be scoped to any administrative unit
        (region, zone, woreda, kebele) to identify local coverage gaps.

        **Status definitions**
        - `administered`: vaccine dose was given
        - `overdue`: due date has passed, dose not given
        - `defaulter`: extended period without vaccination (flagged for outreach)
        - `upcoming`: dose is scheduled but not yet due
        - `coverage_pct` = administered ÷ total_scheduled × 100
        - `missed_pct` = (overdue + defaulter) ÷ total_scheduled × 100

        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: query
          name: unit_id
          schema:
            type: string
            format: uuid
          description: Filter to patients in this administrative unit and all its children
        - in: query
          name: vaccine_id
          schema:
            type: string
            format: uuid
          description: Restrict to a single vaccine
        - in: query
          name: date_from
          schema:
            type: string
            format: date
          description: Only include schedule slots with due_date >= date_from
        - in: query
          name: date_to
          schema:
            type: string
            format: date
          description: Only include schedule slots with due_date <= date_to
      responses:
        '200':
          description: Coverage statistics per vaccine
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaccineCoverageResponse'
              example:
                generated_at: "2026-04-30T08:00:00Z"
                filters:
                  unit_id: null
                  vaccine_id: null
                  date_from: null
                  date_to: null
                summary:
                  total_scheduled: 45000
                  total_administered: 34200
                  overall_coverage_pct: 76.0
                vaccines:
                  - vaccine_code: BCG
                    vaccine_name: BCG Vaccine
                    antigen_name: Tuberculosis
                    total_scheduled: 5000
                    administered: 4500
                    overdue: 300
                    defaulter: 100
                    upcoming: 100
                    coverage_pct: 90.0
                    missed_pct: 8.0
                  - vaccine_code: OPV1
                    vaccine_name: Oral Polio Vaccine Dose 1
                    antigen_name: Poliomyelitis
                    total_scheduled: 5000
                    administered: 3800
                    overdue: 700
                    defaulter: 300
                    upcoming: 200
                    coverage_pct: 76.0
                    missed_pct: 20.0

  /api/v1/analytics/coverage/by-region/:
    get:
      tags: [Analytics]
      summary: Vaccine coverage by region (map view)
      description: |
        Returns vaccination coverage aggregated at the top-level administrative region level
        (Ethiopia has 12 regions + 2 city administrations). Each region reports total scheduled,
        administered count, and coverage percentage.

        Designed to power the national coverage map on the Ministry of Health dashboard —
        each region is coloured by coverage percentage so officials can instantly see
        which areas are underperforming and require targeted outreach campaigns.

        Pass `?vaccine_id=` to see coverage for a specific vaccine across all regions.
        **Roles:** ADMIN, PUBLIC_HEALTH_OFFICIAL
      parameters:
        - in: query
          name: vaccine_id
          schema:
            type: string
            format: uuid
          description: Restrict to a single vaccine (recommended for map view)
        - in: query
          name: date_from
          schema:
            type: string
            format: date
        - in: query
          name: date_to
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Coverage per region
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionCoverageResponse'

  # ── Patient Self-Service ────────────────────────────────────────────────────

  /api/v1/patients/me/:
    get:
      tags: [Patient Self-Service]
      summary: Get my patient profile and immunization summary
      description: |
        Returns the authenticated patient's own registration record combined with
        their current immunization summary. Patients log in using a PATIENT-role account
        that is linked to their record via the `user_account` field.
        Use this as the entry point for the patient-facing mobile app dashboard.
        **Roles:** PATIENT, ADMIN
      responses:
        '200':
          description: Patient profile with immunization summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientSummary'
        '404':
          description: No patient record linked to this account

  /api/v1/patients/me/schedule:
    get:
      tags: [Patient Self-Service]
      summary: Get my vaccination schedule
      description: |
        Returns the authenticated patient's full vaccination schedule ordered by due date.
        Allows a patient to check upcoming appointments and overdue doses without
        needing to go through a health worker.
        **Roles:** PATIENT, ADMIN
      responses:
        '200':
          description: Vaccination schedule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleSlot'

  /api/v1/patients/me/doses:
    get:
      tags: [Patient Self-Service]
      summary: Get my immunization history
      description: |
        Returns all vaccine doses recorded for the authenticated patient, newest first.
        Used to generate a digital immunization card that the patient can present
        at any health facility or border crossing.
        **Roles:** PATIENT, ADMIN
      responses:
        '200':
          description: Immunization history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImmunizationEvent'

  # ── Caregiver Self-Service ──────────────────────────────────────────────────

  /api/v1/caregivers/me/patients:
    get:
      tags: [Caregiver Self-Service]
      summary: List my assigned patients
      description: |
        Returns all patients whose primary_caregiver is the authenticated caregiver.
        Allows a registered caregiver (typically a parent) to see the immunization
        records of all children linked to them without requiring a health worker.
        **Roles:** CAREGIVER, ADMIN
      responses:
        '200':
          description: List of patients assigned to this caregiver
          content:
            application/json:
              schema:
                type: array
