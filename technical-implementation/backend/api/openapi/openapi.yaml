openapi: 3.0.3
info:
  title: NVOMS API
  description: |
    **National Vaccination and Outbreak Monitoring System — Ethiopia**
  version: 1.1.0
servers:
- url: https://known in the future /v1
  description: Production
security:
- BearerAuth: []
tags:
- name: Authentication
  description: "Login, session management, token refresh, password reset and change."
- name: User Management
  description: Create and manage system user accounts. Required role — ADMIN.
- name: Roles & Permissions
  description: Role and permission assignment management. Required role — ADMIN.
- name: Geography & Facilities
  description: Administrative hierarchy and health facility master data.
- name: Caregivers
  description: Primary contacts linked to one or more patients.
- name: Patient Registry
  description: "Patient registration, search, immunization status, and duplicate resolution."
- name: Vaccine Reference Data
  description: "Vaccine definitions, EPI schedule versions, dose rules, and vaccine batches."
- name: Immunization Workflow
  description: "Dose recording, schedule retrieval, status history, defaulter tracking, and schedule regeneration."
- name: Surveillance & Follow-Up
  description: "Disease surveillance reports, adverse events, and follow-up case management."
- name: Outbreak Alerts
  description: Outbreak alert review and status management.
- name: Notifications
  description: "SMS templates, automated dispatch, and delivery tracking."
- name: Offline Synchronization
  description: "Batch upload from offline PWA, conflict detection and resolution."
- name: Analytics & Risk Map
  description: "Coverage rates, trend analytics, outbreak risk scores, and defaulter clusters."
- name: Environmental Data
  description: Meteorological observation ingestion and manual entry.
- name: Prediction & ML
  description: ML model registry and prediction run lifecycle.
- name: Reporting
  description: Report templates and generated report file management.
- name: Interoperability & FHIR
  description: "DHIS2 sync, HL7 FHIR R4 exchange, and integration endpoint configuration."
- name: System & Audit
  description: "System settings, configuration management, and audit log access."
paths:
  /auth/login:
    post:
      tags:
      - Authentication
      summary: Authenticate and obtain a JWT access token
      description: |
        Backed by: `users`, `user_sessions`.
        A successful login creates a row in `user_sessions`. The `jwt_id` claim maps to `user_sessions.jwt_id`.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: Login successful. `user_sessions` row created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials. `users.failed_login_attempts` incremented.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: Account locked. `users.status = locked`; `locked_until` is set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account suspended or deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security: []
  /auth/refresh:
    post:
      tags:
      - Authentication
      summary: Obtain a new access token using a valid refresh token
      description: Backed by `user_sessions`.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_refresh_body"
        required: true
      responses:
        "200":
          description: New `access_token` and `refresh_token` returned. Previous session row replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
        "401":
          description: "Refresh token invalid, expired, or already revoked."
      security: []
  /auth/logout:
    post:
      tags:
      - Authentication
      summary: Revoke the current session
      description: |
        Backed by `user_sessions`.
        Sets `user_sessions.revoked_at` on the record matching the current `jwt_id`.
        Token is invalid immediately.
      responses:
        "200":
          description: Session revoked. All subsequent requests with this token return 401.
  /auth/password-reset/request:
    post:
      tags:
      - Authentication
      summary: Request a password reset token
      description: |
        Backed by `password_reset_tokens`.
        Response is identical whether the email exists or not (prevents enumeration).
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/passwordreset_request_body"
        required: true
      responses:
        "200":
          description: Token created and dispatched (response identical regardless of email existence).
      security: []
  /auth/password-reset/confirm:
    post:
      tags:
      - Authentication
      summary: Set a new password using a valid reset token
      description: "Backed by `users`, `password_reset_tokens`, `user_sessions`."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/passwordreset_confirm_body"
        required: true
      responses:
        "200":
          description: Password updated. `password_reset_tokens.used_at` set. All `user_sessions` rows revoked.
        "400":
          description: Token expired or already used.
        "404":
          description: Token not found.
      security: []
  /auth/change-password:
    post:
      tags:
      - Authentication
      summary: Change password for the currently authenticated user
      description: |
        Backed by `users`, `user_sessions`.
        Required role: Any authenticated user.
        All other active `user_sessions` are revoked on success.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth_changepassword_body"
        required: true
      responses:
        "200":
          description: Password changed. All other active sessions revoked. `must_change_password` set to false.
        "401":
          description: Current password is incorrect.
        "422":
          description: New password fails complexity requirements.
  /users:
    get:
      tags:
      - User Management
      summary: List user accounts with filters
      parameters:
      - name: role_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: facility_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/UserStatus"
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 20
      responses:
        "200":
          description: Paginated list of user records.
    post:
      tags:
      - User Management
      summary: Create a new user account
      description: |
        Backed by `users`. Required role: ADMIN.
        New account is created with `status = inactive` and `must_change_password = true`.
        A temporary password is sent via SMS.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/users_body"
        required: true
      responses:
        "201":
          description: User created with `status = inactive` and `must_change_password = true`.
        "409":
          description: Email already exists.
        "422":
          description: Validation failed.
  /users/{user_id}:
    get:
      tags:
      - User Management
      summary: Retrieve a single user account
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Full user record.
        "404":
          description: User not found.
    put:
      tags:
      - User Management
      summary: Update a user account
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/users_user_id_body"
        required: true
      responses:
        "200":
          description: User updated. Change recorded in `audit_logs`.
        "404":
          description: User not found.
  /users/{user_id}/unlock:
    post:
      tags:
      - User Management
      summary: Unlock a locked user account
      description: |
        Backed by `users`. Required role: ADMIN.
        Resets `failed_login_attempts` to 0, clears `locked_until`, sets `status = active`.
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Account unlocked.
        "404":
          description: User not found.
        "422":
          description: Account is not in locked state.
  /roles:
    get:
      tags:
      - Roles & Permissions
      summary: List all roles
      responses:
        "200":
          description: "All roles with `role_id`, `role_code`, `role_name`, and `description`."
  /roles/{role_id}/permissions:
    get:
      tags:
      - Roles & Permissions
      summary: List permissions assigned to a role
      parameters:
      - name: role_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: All permission records joined with `permissions`.
        "404":
          description: Role not found.
    post:
      tags:
      - Roles & Permissions
      summary: Assign a permission to a role
      parameters:
      - name: role_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/role_id_permissions_body"
        required: true
      responses:
        "201":
          description: Permission assigned.
        "409":
          description: Permission already assigned to this role.
  /roles/{role_id}/permissions/{permission_id}:
    delete:
      tags:
      - Roles & Permissions
      summary: Remove a permission from a role
      parameters:
      - name: role_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: permission_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Permission removed.
        "404":
          description: Assignment not found.
  /admin-units:
    get:
      tags:
      - Geography & Facilities
      summary: List administrative units
      description: |
        Backed by `administrative_units`. Required role: Any authenticated user.
        Level values are exact SQL values. UI may display different labels.
      parameters:
      - name: level
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/GeographyLevel"
      - name: parent_unit_id
        in: query
        description: Return direct children of this unit.
        required: false
        schema:
          type: string
          format: uuid
      - name: is_active
        in: query
        required: false
        schema:
          type: boolean
          default: true
      responses:
        "200":
          description: Paginated list of administrative units.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_1"
  /admin-units/{unit_id}:
    get:
      tags:
      - Geography & Facilities
      summary: Retrieve a single administrative unit
      parameters:
      - name: unit_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Full unit record including `boundary_geojson`.
        "404":
          description: Unit not found.
  /facilities:
    get:
      tags:
      - Geography & Facilities
      summary: List health facilities
      parameters:
      - name: unit_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: facility_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - health_post
          - health_center
          - hospital
      - name: is_active
        in: query
        required: false
        schema:
          type: boolean
          default: true
      responses:
        "200":
          description: "Paginated list with `facility_id`, `facility_code`, `facility_name`, `facility_type`, `dhis2_org_unit_code`, `latitude`, and `longitude`."
  /facilities/{facility_id}:
    get:
      tags:
      - Geography & Facilities
      summary: Retrieve a single health facility
      description: Backed by `health_facilities`.
      parameters:
      - name: facility_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Full facility record.
        "404":
          description: Facility not found.
  /caregivers:
    post:
      tags:
      - Caregivers
      summary: Register a caregiver independently
      description: |
        Backed by `caregivers`. Required role: HEALTH_WORKER.
        Caregivers are also created automatically when registering a new patient via `POST /patients`.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/caregivers_body"
        required: true
      responses:
        "201":
          description: Caregiver created. Returns `caregiver_id`.
        "409":
          description: Phone number already registered.
  /caregivers/{caregiver_id}:
    get:
      tags:
      - Caregivers
      summary: Retrieve a caregiver and their linked patients
      parameters:
      - name: caregiver_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: "Caregiver record with list of linked patient UIDs, names, and statuses."
        "404":
          description: Caregiver not found.
    put:
      tags:
      - Caregivers
      summary: Update caregiver contact details
      parameters:
      - name: caregiver_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/caregivers_caregiver_id_body"
        required: true
      responses:
        "200":
          description: Caregiver updated.
        "404":
          description: Caregiver not found.
  /patients:
    post:
      tags:
      - Patient Registry
      summary: Register a new patient and link to a caregiver
      description: |
        Backed by `patients`, `caregivers`, `patient_vaccination_schedules`. Required role: HEALTH_WORKER.
        A unique `uid` is generated at registration. Duplicate detection runs automatically.
        The vaccination schedule is initialised in `patient_vaccination_schedules`.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientRegistrationRequest"
        required: true
      responses:
        "201":
          description: Patient registered. UID generated. Schedule initialised.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientRegistrationResponse"
        "202":
          description: Potential duplicate detected. Returns candidate matches for review.
        "422":
          description: Validation failed.
  /patients/search:
    get:
      tags:
      - Patient Registry
      summary: Search patients
      description: |
        Backed by `patients`, `patient_immunization_status`, `caregivers`.
        Required role: HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL.
        At least one search parameter is required.
        `vax_status` filters on `patient_immunization_status.current_status`.
      parameters:
      - name: name
        in: query
        required: false
        schema:
          type: string
      - name: phone
        in: query
        description: Caregiver phone number.
        required: false
        schema:
          type: string
      - name: unit_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - active
          - inactive
      - name: vax_status
        in: query
        description: Use `due_soon` (not `due`). Value `unknown` means status not yet evaluated.
        required: false
        schema:
          $ref: "#/components/schemas/ImmunizationSummaryStatus"
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
      responses:
        "200":
          description: Paginated list of matching patients.
        "400":
          description: At least one search parameter required.
  /patients/duplicates:
    get:
      tags:
      - Patient Registry
      summary: List unresolved duplicate patient cases
      parameters:
      - name: review_status
        in: query
        required: false
        schema:
          type: string
          enum:
          - pending
          - confirmed_duplicate
          - cleared
          default: pending
      - name: facility_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Paginated list of duplicate cases with candidate and matched patient details and `similarity_score`.
  /patients/duplicates/{duplicate_case_id}:
    put:
      tags:
      - Patient Registry
      summary: Resolve a duplicate case
      parameters:
      - name: duplicate_case_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/duplicates_duplicate_case_id_body"
        required: true
      responses:
        "200":
          description: Case resolved. `reviewed_by_user_id` and `reviewed_at` set.
        "404":
          description: Case not found.
  /patients/{uid}:
    get:
      tags:
      - Patient Registry
      summary: Retrieve full patient record and vaccination history
      description: |
        Backed by `patients`, `patient_immunization_status` (MATERIALIZED VIEW), `immunization_events`.
        Required role: HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL.
        Note: The `uid` path parameter is the business identifier (e.g. `ETH-1001-A`), not the internal `patient_id`.
      parameters:
      - name: uid
        in: path
        description: "Patient business identifier (`patients.uid`), not `patient_id`."
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Full patient record. `immunization_status` is from `patient_immunization_status` (MATERIALIZED VIEW).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_2"
        "404":
          description: Patient not found.
  /patients/{uid}/immunization-status:
    get:
      tags:
      - Patient Registry
      summary: Get summarised vaccination status for a patient
      description: |
        MATERIALIZED VIEW — backed by `patient_immunization_status`.
        Required role: HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL.
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Current immunization summary from `patient_immunization_status`.
        "404":
          description: Patient not found.
  /vaccines:
    get:
      tags:
      - Vaccine Reference Data
      summary: List all vaccine definitions
      parameters:
      - name: is_active
        in: query
        required: false
        schema:
          type: boolean
      - name: target_disease
        in: query
        required: false
        schema:
          type: string
          example: Measles
      responses:
        "200":
          description: "List of vaccine definitions with `vaccine_code`, `target_disease`, `dose_sequence`, `default_route`, and `default_site`."
  /epi-schedules:
    get:
      tags:
      - Vaccine Reference Data
      summary: List EPI schedule versions
      parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - active
          - draft
          - archived
      responses:
        "200":
          description: List of schedule versions with `effective_from` and `effective_to` dates.
  /epi-schedules/{schedule_version_id}/rules:
    get:
      tags:
      - Vaccine Reference Data
      summary: List dose rules for a schedule version
      parameters:
      - name: schedule_version_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: All active rules for the specified schedule version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_3"
  /vaccine-batches:
    get:
      tags:
      - Vaccine Reference Data
      summary: List vaccine batches
      parameters:
      - name: vaccine_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: is_valid
        in: query
        description: Filter valid (non-expired) batches.
        required: false
        schema:
          type: boolean
      responses:
        "200":
          description: "List with `batch_number`, `manufacturer_name`, `expiry_date`, and `is_valid`."
  /patients/{uid}/immunizations:
    post:
      tags:
      - Immunization Workflow
      summary: Record a vaccine dose administration
      description: |
        Backed by `immunization_events`, `patient_vaccination_schedules`, `schedule_status_events`.
        Required role: HEALTH_WORKER.
        Updates `patient_vaccination_schedules.status` to `administered`.
        Creates a `schedule_status_events` entry.
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImmunizationEventRequest"
        required: true
      responses:
        "201":
          description: Dose recorded successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_201"
        "400":
          description: Batch expired or invalid (`vaccine_batches.is_valid = false`).
        "404":
          description: Patient or schedule slot not found.
        "409":
          description: This schedule slot is already in `administered` state.
        "422":
          description: Batch belongs to a different vaccine than the slot requires.
  /patients/{uid}/schedule:
    get:
      tags:
      - Immunization Workflow
      summary: Get the full vaccination schedule for a patient
      description: |
        Backed by `patient_vaccination_schedules`, `immunization_events`.
        Required role: HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL.
        Status values are from the schedule-slot state machine (9 states).
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: All schedule slots from `patient_vaccination_schedules`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_4"
        "404":
          description: Patient not found.
  /patients/{uid}/schedule/{patient_schedule_id}/history:
    get:
      tags:
      - Immunization Workflow
      summary: Get status change history for a schedule slot
      description: |
        Backed by `schedule_status_events`. Required role: HEALTH_WORKER, ADMIN.
        Provides full audit trail of slot status transitions.
        All `from_status` and `to_status` values are from the schedule-slot state machine.
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      - name: patient_schedule_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Chronological list of status transitions.
  /patients/{uid}/schedule/regenerate:
    post:
      tags:
      - Immunization Workflow
      summary: Regenerate a patient's vaccination schedule
      description: |
        Backed by `patient_vaccination_schedules`, `epi_schedule_rules`.
        Required role: HEALTH_WORKER, ADMIN.
        Use when schedule needs recomputing after: EPI rule version change, corrected DOB,
        medical exception review, or data repair. All non-administered slots are recalculated.
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/schedule_regenerate_body"
        required: true
      responses:
        "200":
          description: Schedule regenerated. Returns count of updated and new slots.
        "404":
          description: Patient not found.
        "422":
          description: Patient has no `date_of_birth` recorded.
  /immunizations/defaulters:
    get:
      tags:
      - Immunization Workflow
      summary: List patients flagged as defaulters
      description: |
        Backed by `patient_vaccination_schedules`, `patient_immunization_status`, `patients`, `caregivers`.
        Required role: HEALTH_WORKER, PUBLIC_HEALTH_OFFICIAL.
        Returns patients where at least one `patient_vaccination_schedules` row has `status = defaulter`.
        Caregiver phone is included for outreach.
      parameters:
      - name: unit_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: facility_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: days_overdue
        in: query
        description: Minimum days overdue. Defaults to `epi_schedule_rules.defaulter_threshold_days` per vaccine.
        required: false
        schema:
          type: integer
      - name: vaccine_code
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
      responses:
        "200":
          description: Paginated list of defaulter patients with caregiver phone and days overdue per slot.
  /patients/{uid}/surveillance:
    post:
      tags:
      - Surveillance & Follow-Up
      summary: Submit a surveillance observation for a patient
      description: |
        Backed by `surveillance_reports`, `surveillance_symptoms`. Required role: HEALTH_WORKER.
        FHIR Observation ID stored in `fhir_observation_id`.
        District alert dispatched if condition is notifiable.
      parameters:
      - name: uid
        in: path
