      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveillanceReportRequest"
        required: true
      responses:
        "201":
          description: Report saved. Symptoms saved. FHIR Observation ID stored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_201_1"
        "404":
          description: Patient not found.
        "422":
          description: Missing required fields.
  /surveillance:
    get:
      tags:
      - Surveillance & Follow-Up
      summary: List surveillance reports
      parameters:
      - name: condition_type
        in: query
        required: false
        schema:
          type: string
      - name: unit_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: facility_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: severity
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/SurveillanceSeverity"
      - name: from_date
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: to_date
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: status
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/SurveillanceStatus"
      responses:
        "200":
          description: Paginated list of surveillance reports with symptoms.
  /surveillance/{surveillance_report_id}:
    get:
      tags:
      - Surveillance & Follow-Up
      summary: Retrieve a single surveillance report
      parameters:
      - name: surveillance_report_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Full report with all symptom rows.
        "404":
          description: Report not found.
  /surveillance/follow-up-cases:
    get:
      tags:
      - Surveillance & Follow-Up
      summary: List open follow-up cases
      description: |
        DERIVED VIEW — composed from `surveillance_reports` where `follow_up_required = true`.
        No dedicated `follow_up_cases` table; this is a workflow view derived from surveillance reports,
        schedule states, and patient status summaries.
        Required role: PUBLIC_HEALTH_OFFICIAL, ADMIN.
      parameters:
      - name: unit_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - queued
          - under_follow_up
      - name: from_date
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        "200":
          description: "Paginated follow-up cases with patient summary, caregiver phone, and surveillance report details."
  /surveillance/follow-up-cases/{case_id}:
    get:
      tags:
      - Surveillance & Follow-Up
      summary: Get a single follow-up case
      parameters:
      - name: case_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Full follow-up case with linked surveillance report and patient immunization summary.
    patch:
      tags:
      - Surveillance & Follow-Up
      summary: Update follow-up case status
      description: |
        DERIVED VIEW — writes to `surveillance_reports`. Required role: PUBLIC_HEALTH_OFFICIAL, ADMIN.
      parameters:
      - name: case_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/followupcases_case_id_body"
        required: true
      responses:
        "200":
          description: Follow-up status updated on the underlying `surveillance_reports` row.
  /outbreak-alerts:
    get:
      tags:
      - Outbreak Alerts
      summary: List all outbreak alerts
      description: |
        Backed by `outbreak_alerts`. Required role: PUBLIC_HEALTH_OFFICIAL, ADMIN.
        Alerts are generated automatically by the prediction engine or escalated from surveillance reports.
      parameters:
      - name: status
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/OutbreakAlertStatus"
      - name: disease_code
        in: query
        required: false
        schema:
          type: string
          enum:
          - Measles
          - Cholera
          - Polio
      - name: unit_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: alert_source
        in: query
        required: false
        schema:
          type: string
          enum:
          - prediction
          - surveillance
      responses:
        "200":
          description: List of outbreak alerts from `outbreak_alerts`.
  /outbreak-alerts/{outbreak_alert_id}:
    put:
      tags:
      - Outbreak Alerts
      summary: Update an outbreak alert status
      description: |
        Backed by `outbreak_alerts`. Required role: PUBLIC_HEALTH_OFFICIAL, ADMIN.
        Reviewer workflow: `potential` → `under_review` → `confirmed` or `dismissed` or `false_alarm`.
      parameters:
      - name: outbreak_alert_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/outbreakalerts_outbreak_alert_id_body"
        required: true
      responses:
        "200":
          description: Alert updated. `verified_by_user_id` and `verified_at` set.
        "404":
          description: Alert not found.
        "422":
          description: Status transition not allowed.
  /message-templates:
    get:
      tags:
      - Notifications
      summary: List SMS message templates
      parameters:
      - name: channel
        in: query
        required: false
        schema:
          type: string
          enum:
          - sms
      - name: message_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - reminder
          - missed_appointment
          - outbreak_alert
      - name: language_code
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/LanguageCode"
      - name: is_active
        in: query
        required: false
        schema:
          type: boolean
          default: true
      responses:
        "200":
          description: "List of templates with `template_code`, `language_code`, and `template_body`."
  /message-templates/{template_id}:
    put:
      tags:
      - Notifications
      summary: Update a message template
      parameters:
      - name: template_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/messagetemplates_template_id_body"
        required: true
      responses:
        "200":
          description: Template updated.
        "404":
          description: Template not found.
  /notifications/trigger:
    post:
      tags:
      - Notifications
      summary: Manually trigger the daily SMS notification batch job
      description: |
        Backed by `sms_notifications`, `patient_vaccination_schedules`. Required role: ADMIN.
        Runs automatically at 08:00 AM daily via Celery Beat. This endpoint triggers on demand.
      responses:
        "200":
          description: Batch queued. Records written to `sms_notifications` with `status = queued`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_5"
        "500":
          description: Celery task failed.
  /notifications:
    get:
      tags:
      - Notifications
      summary: List SMS notification records
      parameters:
      - name: patient_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: caregiver_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: notification_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - reminder
          - missed_appointment
          - outbreak_alert
      - name: status
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/SmsNotificationStatus"
      - name: from_date
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        "200":
          description: Paginated list from `sms_notifications` with full status vocabulary.
  /notifications/{sms_notification_id}/attempts:
    get:
      tags:
      - Notifications
      summary: List delivery attempt logs for a notification
      description: |
        Backed by `notification_attempts`. Required role: ADMIN.
        Attempt status values: `sent`, `delivered`, `failed`, `retrying`.
      parameters:
      - name: sms_notification_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: All `notification_attempts` rows for this notification.
        "404":
          description: Notification not found.
  /devices:
    get:
      tags:
      - Offline Synchronization
      summary: List registered devices for the current user
      responses:
        "200":
          description: List of devices with `last_seen_at` and `status`.
    post:
      tags:
      - Offline Synchronization
      summary: Register a device for offline sync tracking
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/devices_body"
        required: true
      responses:
        "201":
          description: Device registered. Returns `device_id` for use in sync submissions.
  /sync/batch:
    post:
      tags:
      - Offline Synchronization
      summary: Upload a batch of offline-stored records
      description: |
        Backed by `sync_batches`, `sync_batch_items`. Required role: HEALTH_WORKER.
        Batch status: `submitted`, `processed`, `conflict`, `rejected`.
        Item status: `pending`, `applied`, `conflict`, `rejected`.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncBatchRequest"
        required: true
      responses:
        "200":
          description: Batch processed. `sync_batches` and `sync_batch_items` rows created.
        "400":
          description: Malformed batch payload.
        "401":
          description: Unauthorized.
  /sync/batches:
    get:
      tags:
      - Offline Synchronization
      summary: List sync batch history
      parameters:
      - name: device_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/SyncBatchStatus"
      responses:
        "200":
          description: Paginated list from `sync_batches` with `record_count` and `conflict_count`.
  /sync/batches/{sync_batch_id}/items:
    get:
      tags:
      - Offline Synchronization
      summary: List item outcomes for a sync batch
      parameters:
      - name: sync_batch_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: item_status
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/SyncItemStatus"
      responses:
        "200":
          description: All `sync_batch_items` with `item_status` and `conflict_reason` for conflicted items.
  /sync/batches/{sync_batch_id}/items/{sync_batch_item_id}/resolve:
    put:
      tags:
      - Offline Synchronization
      summary: Resolve a sync conflict item
      description: |
        Backed by `sync_batch_items`, `sync_batches`. Required role: HEALTH_WORKER, ADMIN.
        When all conflicts in a batch are resolved, `sync_batches.status` is updated to `processed`.
      parameters:
      - name: sync_batch_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: sync_batch_item_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/sync_batch_item_id_resolve_body"
        required: true
      responses:
        "200":
          description: Conflict resolved. `item_status` updated to `applied` or `rejected`.
        "404":
          description: Batch or item not found.
        "422":
          description: Item is not in conflict state.
  /analytics/coverage:
    get:
      tags:
      - Analytics & Risk Map
      summary: Get vaccination coverage rates by geographic level
      description: |
        DERIVED VIEW — composed from `patient_immunization_status`, `patients`, `administrative_units`.
        Required role: PUBLIC_HEALTH_OFFICIAL, ADMIN.
        Level parameter uses exact SQL geography level values.
      parameters:
      - name: level
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/GeographyLevel"
      - name: unit_id
        in: query
        description: Required when level is `woreda` or `zone`.
        required: false
        schema:
          type: string
          format: uuid
      - name: vaccine_code
        in: query
        required: false
        schema:
          type: string
      - name: from_date
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: to_date
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        "200":
          description: Coverage statistics aggregated per unit.
  /analytics/dashboard-trends:
    get:
      tags:
      - Analytics & Risk Map
      summary: Get time-series trend data for the main dashboard
      description: |
        DERIVED VIEW — composed from `patient_immunization_status`, `immunization_events`, `surveillance_reports`.
        Required role: PUBLIC_HEALTH_OFFICIAL, ADMIN.
      parameters:
      - name: unit_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: from_date
        in: query
        required: true
        schema:
          type: string
          format: date
      - name: to_date
        in: query
        required: true
        schema:
          type: string
          format: date
      - name: granularity
        in: query
        required: false
        schema:
          type: string
          enum:
          - weekly
          - monthly
          default: weekly
      responses:
        "200":
          description: Time-series trend data aggregated by the requested granularity.
  /analytics/risk-map:
    get:
      tags:
      - Analytics & Risk Map
      summary: Get outbreak risk scores for all districts
      description: |
        COMPOSED MODEL — primary: `prediction_scores`; supporting: `administrative_units`, `environmental_observations`.
        Required role: PUBLIC_HEALTH_OFFICIAL, ADMIN.
        `risk_level` SQL values: `low`, `medium`, `high`, `unknown`.
        `silent_district_flag = true` means no recent surveillance data, NOT confirmed disease-free.
        `boundary_geojson` comes from `administrative_units.boundary_geojson`.
      parameters:
      - name: disease_code
        in: query
        required: false
        schema:
          type: string
          enum:
          - Measles
          - Cholera
          - Polio
      - name: unit_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: prediction_run_id
        in: query
        description: Use a specific run. Defaults to latest.
        required: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Risk scores from `prediction_scores`.
  /analytics/defaulter-clusters:
    get:
      tags:
      - Analytics & Risk Map
      summary: Get spatial defaulter hotspot clusters
      description: |
        PERSISTED TABLE — backed by `defaulter_clusters`.
        Required role: PUBLIC_HEALTH_OFFICIAL, ADMIN.
      responses:
        "200":
          description: "Cluster records with `algorithm_name`, `defaulter_rate`, and `affected_patient_count`."
  /analytics/environmental:
    get:
      tags:
      - Analytics & Risk Map
      summary: Get latest meteorological observations
      description: |
        PERSISTED TABLE — backed by `environmental_observations`.
        Required role: PUBLIC_HEALTH_OFFICIAL, ADMIN.
      parameters:
      - name: unit_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: from_date
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: to_date
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        "200":
          description: Time-series weather readings from `environmental_observations` per woreda.
    post:
      tags:
      - Environmental Data
      summary: Create a manual environmental observation
      description: |
        Backed by `environmental_observations`. Required role: ADMIN.
        Use when automated ingestion fails and a manual reading needs to be entered.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/analytics_environmental_body"
        required: true
      responses:
        "201":
          description: Observation stored in `environmental_observations`.
        "422":
          description: Missing `unit_id` or `observed_at`.
  /integrations/weather/ingest:
    post:
      tags:
      - Environmental Data
      summary: Trigger a weather data ingestion job
      description: |
        Backed by `integration_jobs`, `environmental_observations`. Required role: ADMIN.
        Runs automatically every 6 hours via Celery Beat. This endpoint triggers on demand.
        Creates an `integration_jobs` row with `job_type = weather_ingest`.
        On failure, last known values are used for the prediction cycle.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/weather_ingest_body"
      responses:
        "200":
          description: Ingestion completed. `environmental_observations` rows created or updated.
        "503":
          description: External weather API unreachable. Last known values used for prediction cycle.
  /models:
    get:
      tags:
      - Prediction & ML
      summary: List all registered ML models
      responses:
        "200":
          description: "All models with `model_name`, `model_version`, `disease_code`, `status`, and `trained_at`."
  /prediction/run:
    post:
      tags:
      - Prediction & ML
      summary: Trigger a prediction model run
      description: |
        Backed by `prediction_runs`, `prediction_scores`. Required role: ADMIN, PUBLIC_HEALTH_OFFICIAL.
        Creates a `prediction_runs` row with `run_type = on_demand`.
        Note: The API returns `api_status = queued` as a contract-only indicator before the DB row transitions to `running`.
        This `queued` value is **not** persisted in the database.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/prediction_run_body"
      responses:
        "202":
          description: Run started. `prediction_runs` row created with `status = running`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_202"
        "500":
          description: Model service unavailable.
  /prediction/runs:
    get:
      tags:
      - Prediction & ML
      summary: List prediction run history
      parameters:
      - name: model_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/PredictionRunStatus"
      - name: run_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - scheduled
          - on_demand
      responses:
        "200":
          description: "Paginated list from `prediction_runs` with `started_at`, `completed_at`, and `error_message` if failed."
  /prediction/runs/{prediction_run_id}:
    get:
      tags:
      - Prediction & ML
      summary: Get details and scores for a prediction run
      parameters:
      - name: prediction_run_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: '`prediction_runs` record plus all `prediction_scores` for this run.'
        "404":
          description: Run not found.
  /report-definitions:
    get:
      tags:
      - Reporting
      summary: List available report templates
      responses:
        "200":
          description: "All report templates with `report_code`, `report_name`, `report_scope`, and `description`."
  /reports/generate:
    post:
      tags:
      - Reporting
      summary: Generate a report
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/reports_generate_body"
        required: true
      responses:
        "200":
          description: Report queued. `generated_reports` row created with `generation_status = processing`.
        "202":
          description: Large report queued. Download available after generation.
        "400":
          description: Invalid definition or parameters.
  /reports:
    get:
      tags:
      - Reporting
      summary: List generated reports
      responses:
        "200":
          description: Paginated list with `generation_status` and download URL.
  /reports/download/{generated_report_id}:
    get:
      tags:
      - Reporting
      summary: Download a generated report
      parameters:
      - name: generated_report_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: File returned from `generated_reports.file_uri` as PDF or CSV.
        "202":
          description: Still processing. Retry shortly.
        "404":
          description: Report not found or expired.
  /integrations/endpoints:
    get:
      tags:
      - Interoperability & FHIR
      summary: List configured integration endpoints
      responses:
        "200":
          description: "List with `endpoint_type`, `endpoint_name`, `base_url`, `auth_type`, and `is_active`."
  /integrations/endpoints/{endpoint_id}:
    put:
      tags:
      - Interoperability & FHIR
      summary: Update an integration endpoint configuration
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/endpoints_endpoint_id_body"
      responses:
        "200":
          description: Endpoint updated.
        "404":
          description: Endpoint not found.
  /integrations/dhis2/sync:
    post:
      tags:
      - Interoperability & FHIR
      summary: Trigger a DHIS2 sync job
      description: |
        Backed by `integration_jobs`, `dhis2_sync_batches`, `dhis2_sync_items`. Required role: ADMIN.
        Runs automatically weekly via Celery Beat.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/dhis2_sync_body"
      responses:
        "200":
          description: Sync complete. `dhis2_sync_batches` and `dhis2_sync_items` created.
        "503":
          description: DHIS2 unreachable.
  /integrations/dhis2/sync/batches:
    get:
      tags:
      - Interoperability & FHIR
      summary: List DHIS2 sync batch history
      responses:
        "200":
          description: "Paginated list with `records_attempted`, `records_imported`, `records_failed`."
  /integrations/dhis2/sync/batches/{dhis2_sync_batch_id}/items:
    get:
      tags:
      - Interoperability & FHIR
      summary: List item outcomes for a DHIS2 sync batch
      parameters:
      - name: dhis2_sync_batch_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: sync_status
        in: query
        required: false
        schema:
          type: string
          enum:
          - success
          - failed
          - skipped
      responses:
        "200":
          description: All `dhis2_sync_items` with `sync_status` and `error_message`.
  /fhir/Patient/{uid}:
    get:
      tags:
      - Interoperability & FHIR
      summary: Retrieve a patient as a FHIR R4 Patient resource
      description: |
        Backed by `patients`. FHIR direction: `export`. Required role: Authorised external system or ADMIN.
        Transaction logged in `fhir_exchange_logs` with `exchange_status = success`.
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: FHIR R4 Patient resource.
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/inline_response_200_6"
        "404":
          description: Patient not found.
  /fhir/Immunization:
    get:
      tags:
      - Interoperability & FHIR
      summary: Retrieve immunization records as a FHIR Bundle
      parameters:
      - name: patient
        in: query
        description: Patient UID.
        required: true
        schema:
          type: string
      responses:
        "200":
          description: FHIR Bundle of Immunization resources.
        "404":
          description: No records found.
  /fhir/Observation:
    get:
      tags:
      - Interoperability & FHIR
      summary: Retrieve surveillance reports as a FHIR Bundle
      parameters:
      - name: patient
        in: query
        description: Patient UID. Maps to `surveillance_reports.fhir_observation_id`.
        required: true
        schema:
          type: string
      responses:
        "200":
          description: FHIR Bundle of Observation resources.
        "404":
          description: No observations found.
  /fhir/Patient/{uid}/bundle:
    get:
      tags:
      - Interoperability & FHIR
      summary: Retrieve all FHIR resources for a patient in a single bundle
      description: |
        Backed by `patients`, `immunization_events`, `surveillance_reports`.
        Required role: Authorised external system or ADMIN.
        Returns a FHIR Bundle containing Patient + all associated Immunization and Observation resources.
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Complete FHIR Bundle for the patient (Patient + Immunization + Observation entries).
        "404":
          description: Patient not found.
  /integrations/fhir/logs:
    get:
      tags:
      - Interoperability & FHIR
      summary: List FHIR exchange transaction logs
      description: |
        Backed by `fhir_exchange_logs`. Required role: ADMIN.
        `direction` values: `export` (sent from NVOMS) or `import` (received from external).
        `exchange_status` values: `success`, `mapping_error`, `transmission_error`.
      parameters:
      - name: direction
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/FhirExchangeDirection"
      - name: resource_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - Patient
          - Immunization
          - Observation
      - name: exchange_status
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/FhirExchangeStatus"
      - name: from_date
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        "200":
          description: Paginated FHIR exchange log entries.
  /system/settings:
    get:
      tags:
      - System & Audit
      summary: Retrieve system configuration settings
      description: |
        Backed by `system_settings`. Required role: ADMIN.
        `setting_scope` values: `global`, `facility`, `integration`.
        Values with `is_encrypted = true` are redacted in the response.
      parameters:
      - name: setting_scope
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/SettingScope"
      - name: facility_id
        in: query
        description: Required when `setting_scope = facility`.
        required: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: List of settings. Encrypted values are redacted.
  /system/settings/{setting_key}:
    put:
      tags:
      - System & Audit
      summary: Update a system configuration value
      parameters:
      - name: setting_key
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/settings_setting_key_body"
        required: true
      responses:
        "200":
          description: Setting updated. `updated_by_user_id` and `updated_at` set.
        "404":
          description: Setting key not found.
        "422":
          description: Validation failed (e.g. SMS gateway test ping failed for integration scope settings).
  /audit-logs:
    get:
      tags:
      - System & Audit
      summary: Query the system audit log
      description: |
        Backed by `audit_logs`. Required role: ADMIN.
        All write operations across the system create entries here with `before_state` and `after_state`.
      parameters:
      - name: actor_user_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: subsystem
        in: query
        required: false
        schema:
          type: string
          example: immunization
      - name: action_code
        in: query
        required: false
        schema:
          type: string
          example: dose_recorded
      - name: entity_type
        in: query
        required: false
        schema:
          type: string
          example: immunization_event
      - name: entity_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: from_date
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: to_date
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        "200":
          description: Paginated audit log entries from `audit_logs`.
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ErrorResponse_error"
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 20
        total:
          type: integer
          example: 340
        total_pages:
          type: integer
          example: 17
    UserStatus:
      type: string
      description: |
        - `inactive`: Account created; first login pending
        - `active`: Normal operating state
        - `locked`: Failed login threshold exceeded; locked_until is set
        - `suspended`: Administratively suspended
        - `deleted`: Soft-deleted; login permanently refused
      enum:
      - inactive
      - active
      - locked
      - suspended
      - deleted
    LanguageCode:
      type: string
      description: ISO 639-1 two-letter language code
      enum:
      - am
      - om
      - so
      - en
    GeographyLevel:
      type: string
      description: |
        Exact SQL values stored in `administrative_units.level`:
        - `country`: National level (Ethiopia) — UI label: National
        - `region`: Regional state (e.g. Oromia) — UI label: Regional
        - `zone`: Zonal administration — UI label: Zonal
        - `woreda`: District-level unit
        - `kebele`: Sub-district, community level (leaf node)
      enum:
      - country
      - region
      - zone
      - woreda
      - kebele
    ScheduleSlotStatus:
      type: string
      description: |
        Status values for `patient_vaccination_schedules.status`:
        - `scheduled`: Slot created; dose date is in the future
        - `pending`: Within window but not yet due today
        - `due_soon`: Within grace_period_days of the due date
        - `due_today`: Due date is today
        - `overdue`: Past due date; within defaulter_threshold_days
        - `defaulter`: Exceeded defaulter_threshold_days without administration
        - `administered`: Dose has been given (terminal success)
        - `exempt`: Medical exception applied (terminal)
        - `cancelled`: Administratively cancelled (terminal)
      enum:
      - scheduled
      - pending
      - due_soon
      - due_today
      - overdue
      - defaulter
      - administered
      - exempt
      - cancelled
    ImmunizationSummaryStatus:
      type: string
      description: |
        Summary status values for `patient_immunization_status.current_status` (MATERIALIZED VIEW):
        - `up_to_date`: All due doses administered on time
        - `due_soon`: At least one dose due within grace period
        - `overdue`: At least one dose is past due but within defaulter threshold
        - `defaulter`: At least one dose exceeded defaulter_threshold_days
        - `zero_dose`: No doses have ever been administered
        - `unknown`: Not yet evaluated (newly registered patients)
      enum:
      - up_to_date
      - due_soon
      - overdue
      - defaulter
      - zero_dose
      - unknown
    SurveillanceStatus:
      type: string
      enum:
      - submitted
      - queued
      - under_follow_up
      - closed
    SurveillanceSeverity:
      type: string
      enum:
      - low
      - moderate
      - high
      - critical
    OutbreakAlertStatus:
      type: string
      enum:
      - potential
      - under_review
      - confirmed
      - dismissed
      - false_alarm
    SmsNotificationStatus:
      type: string
      enum:
      - queued
      - sent
      - delivered
      - pending_retry
      - failed
      - cancelled
    SyncBatchStatus:
      type: string
      enum:
      - submitted
      - processed
      - conflict
      - rejected
    SyncItemStatus:
      type: string
      enum:
      - pending
      - applied
      - conflict
      - rejected
    FhirExchangeDirection:
      type: string
      enum:
      - export
      - import
    FhirExchangeStatus:
      type: string
      enum:
      - success
      - mapping_error
      - transmission_error
    PredictionRunStatus:
      type: string
      enum:
