openapi: 3.1.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
info:
  title: Vaccination and Outbreak Monitoring API
  version: 0.1.0
  license:
    name: UNLICENSED
    identifier: UNLICENSED
  description: >
    Current contract set for the project MVP and phase-two integration planning. This
    version documents authentication, registry, immunization, surveillance,
    notifications, analytics, prediction, reporting, interoperability, and offline
    synchronization workflows.
    Example payloads use Ethiopia-context sample data and are fictional.
servers:
  - url: http://127.0.0.1:3000/api/v1
    description: Local development
tags:
  - name: Auth
    description: Login and token refresh endpoints used by the web client and admin users
  - name: Registry
    description: Patient and caregiver registration, retrieval, and search
  - name: Immunization
    description: Vaccination schedules and dose recording
  - name: Surveillance
    description: Surveillance observations, follow-up cases, and field monitoring
  - name: Notifications
    description: Reminder, alert, and notification history workflows
  - name: Analytics
    description: Dashboard summary endpoints
  - name: Prediction
    description: Risk scoring, prediction runs, and outbreak alert endpoints
  - name: Reporting
    description: Report generation, retrieval, and export endpoints
  - name: Interoperability
    description: FHIR and DHIS2 exchange workflows
  - name: Offline Sync
    description: Device registration and offline synchronization workflows
paths:
  /auth/login:
    $ref: ./paths/auth.yaml#/login
  /auth/refresh:
    $ref: ./paths/auth.yaml#/refresh
  /patients:
    $ref: ./paths/registry.yaml#/patients
  /patients/{patientId}:
    $ref: ./paths/registry.yaml#/patientById
  /patients/{patientId}/schedule:
    $ref: ./paths/immunization.yaml#/patientSchedule
  /patients/{patientId}/immunizations:
    $ref: ./paths/immunization.yaml#/patientImmunizations
  /patients/{patientId}/surveillance-reports:
    $ref: ./paths/surveillance.yaml#/patientSurveillanceReports
  /surveillance/follow-up-cases:
    $ref: ./paths/surveillance.yaml#/followUpCases
  /surveillance/reports/{reportId}:
    $ref: ./paths/surveillance.yaml#/surveillanceReportById
  /notifications:
    $ref: ./paths/notifications.yaml#/notifications
  /analytics/coverage-summary:
    $ref: ./paths/analytics.yaml#/coverageSummary
  /predictions/runs:
    $ref: ./paths/prediction.yaml#/predictionRuns
  /predictions/scores:
    $ref: ./paths/prediction.yaml#/predictionScores
  /predictions/alerts:
    $ref: ./paths/prediction.yaml#/predictionAlerts
  /reports:
    $ref: ./paths/reporting.yaml#/reports
  /reports/{reportId}:
    $ref: ./paths/reporting.yaml#/reportById
  /interop/fhir/exports:
    $ref: ./paths/interoperability.yaml#/fhirExports
  /interop/dhis2/sync-jobs:
    $ref: ./paths/interoperability.yaml#/dhis2SyncJobs
  /interop/jobs/{jobId}:
    $ref: ./paths/interoperability.yaml#/interoperabilityJobById
  /sync/devices:
    $ref: ./paths/offline-sync.yaml#/devices
  /sync/batches:
    $ref: ./paths/offline-sync.yaml#/syncBatches
  /sync/batches/{batchId}:
    $ref: ./paths/offline-sync.yaml#/syncBatchById
components:
  securitySchemes:
    bearerAuth:
      $ref: ./components/security/bearer-auth.yaml
