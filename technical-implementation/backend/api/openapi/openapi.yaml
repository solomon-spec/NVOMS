  /api/v1/caregivers/me/patients/{patient_id}/doses:
    get:
      tags: [Caregiver Self-Service]
      summary: Get immunization history for one of my patients
      description: |
        Returns the complete dose history for a patient assigned to the caregiver.
        Used to check which vaccines have been given and which are still pending,
        useful before visiting a facility to know what to ask for.
        **Roles:** CAREGIVER, ADMIN
      parameters:
        - in: path
          name: patient_id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Immunization history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImmunizationEvent'
        '404':
          description: Patient not found or not assigned to this caregiver

  # ── Device Registration ─────────────────────────────────────────────────────

  /api/v1/offline/devices:
    get:
      tags: [Offline Sync]
      summary: List my registered devices
      description: |
        Returns all devices the authenticated health worker has registered for offline use.
        **Roles:** ADMIN, HEALTH_WORKER
      responses:
        '200':
          description: Device list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceRegistration'
    post:
      tags: [Offline Sync]
      summary: Register a device for offline use
      description: |
        Registers a new mobile device (phone or tablet) for the authenticated health worker.
        A device must be registered before it can submit sync batches. The returned
        `device_id` must be included in all subsequent sync batch submissions from that device.
        **Roles:** ADMIN, HEALTH_WORKER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegistrationCreateRequest'
      responses:
        '201':
          description: Device registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceRegistration'

  /api/v1/offline/devices/{id}:
    get:
      tags: [Offline Sync]
      summary: Get device info
      description: Returns device details and updates `last_seen_at`. **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Device detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceRegistration'
        '404':
          description: Device not found
    delete:
      tags: [Offline Sync]
      summary: Disable a device
      description: |
        Soft-disables a device (status=disabled). Disabled devices cannot submit new sync batches.
        Use when a device is lost, stolen, or decommissioned.
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '204':
          description: Device disabled

  # ── Sync Batches ────────────────────────────────────────────────────────────

  /api/v1/offline/sync/batches:
    post:
      tags: [Offline Sync]
      summary: Submit sync batch (writes directly to database)
      description: |
        Submits a batch of records collected while the device was offline and **writes them
        directly into the database**. Health workers record immunization events on their mobile
        device when there is no internet connection, then upload the entire batch when they
        reconnect — rather than re-entering each record one by one.

        **Immunization items** (entity_type=immunization, operation_type=insert):
        - Creates a real `ImmunizationEvent` record for each dose given
        - Automatically transitions the linked `PatientVaccinationSchedule` slot to `administered`
        - Writes a `ScheduleStatusEvent` audit entry attributed to `offline_sync`
        - `source_channel` is set to `synced` to distinguish from online entries
        - Duplicate prevention: if `local_client_record_id` already exists on the server,
          the item is marked `conflict` rather than creating a duplicate record

        Per-item status returned:
        - `applied` — record written successfully; `server_record_id` contains the new UUID
        - `conflict` — duplicate `local_client_record_id` detected; resolve via the resolve endpoint
        - `rejected` — invalid payload (missing patient/vaccine ID, unparseable date)

        If any items have `conflict` status, the batch status is set to `conflict`.
        **Roles:** ADMIN, HEALTH_WORKER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncBatchSubmitRequest'
      responses:
        '201':
          description: Batch processed — check item statuses for conflicts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncBatchSubmitResponse'
        '400':
          description: Validation error (missing fields, invalid device_id)
        '404':
          description: Device not found or not active

  /api/v1/offline/sync/batches/{id}/:
    get:
      tags: [Offline Sync]
      summary: Get batch status
      description: |
        Returns the current status and conflict count of a previously submitted sync batch.
        Poll this to check whether all items were applied or if conflicts remain.
        **Roles:** ADMIN, HEALTH_WORKER (must be the submitter)
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncBatch'
        '404':
          description: Batch not found

  /api/v1/offline/sync/batches/{id}/items:
    get:
      tags: [Offline Sync]
      summary: List batch items
      description: |
        Returns all items in a sync batch with their individual processing status.
        Filter by `?item_status=conflict` to quickly locate items needing resolution
        without iterating the full list.
        **Roles:** ADMIN, HEALTH_WORKER (must be the submitter)
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
        - in: query
          name: item_status
          schema:
            type: string
            enum: [pending, applied, conflict, rejected]
          description: Filter by processing status
      responses:
        '200':
          description: Batch item list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SyncBatchItem'

  /api/v1/offline/sync/batches/{id}/items/{item_id}/resolve:
    post:
      tags: [Offline Sync]
      summary: Resolve conflict
      description: |
        Resolves a conflicting sync item. Choose `keep_server` to discard the client
        change and accept the server version, or `keep_client` to override with an
        explicitly provided `override_payload`.

        When all conflicts in the batch are resolved, the batch status automatically
        moves to `processed`.
        **Roles:** ADMIN, HEALTH_WORKER (must be the batch submitter)
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
        - in: path
          name: item_id
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConflictResolveRequest'
      responses:
        '200':
          description: Conflict resolved; item now applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncBatchItem'
        '400':
          description: Validation error
        '404':
          description: Item not found or not in conflict status

  /api/v1/offline/sync/config:
    get:
      tags: [Offline Sync]
      summary: Get sync configuration
      description: |
        Returns the sync configuration for the mobile client: maximum batch size,
        supported entity and operation types, recommended sync interval in minutes,
        and the server's current timestamp so the device can align its clock before syncing.
        **Roles:** ADMIN, HEALTH_WORKER
      responses:
        '200':
          description: Sync configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncConfigResponse'

  /api/v1/offline/sync/reference-data:
    get:
      tags: [Offline Sync]
      summary: Get reference data snapshot
      description: |
        Returns a complete snapshot of all reference data the mobile app needs to
        function offline: active vaccines, antigens, the current EPI schedule with all
        dose rules, the administrative unit hierarchy, and registered facilities.

        Clients should call this on every successful online session to keep their local
        cache current. Pass `?updated_since=<ISO datetime>` as an advisory hint
        (currently returns full dataset; incremental filtering is planned).
        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: query
          name: updated_since
          schema:
            type: string
            format: date-time
          description: Advisory — return only records changed after this timestamp (planned feature)
      responses:
        '200':
          description: Full reference data snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncReferenceDataResponse'

  # ── Notifications ────────────────────────────────────────────────────────────

  /api/v1/notifications/:
    get:
      tags: [Notifications]
      summary: List SMS notifications
      description: |
        Returns all SmsNotifications ordered by most recent first.
        Supports optional filters:
        - `?status=queued|sent|delivered|pending_retry|failed|cancelled`
        - `?patient=<uuid>`
        - `?notification_type=reminder|missed_appointment|manual|…`

        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [queued, sent, delivered, pending_retry, failed, cancelled]
          description: Filter by delivery status
        - in: query
          name: patient
          schema:
            type: string
            format: uuid
          description: Filter by patient UUID
        - in: query
          name: notification_type
          schema:
            type: string
            enum: [reminder, missed_appointment, outbreak_warning, welcome, manual]
          description: Filter by notification type
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SmsNotificationListItem'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

    post:
      tags: [Notifications]
      summary: Create and queue a manual SMS notification
      description: |
        Creates a new SmsNotification in `queued` status. The message will be
        dispatched to the caregiver's phone number at the next `dispatch_queued_notifications`
        task run (every 5 minutes).

        The phone number is taken from the caregiver record — no need to supply it here.

        **Roles:** ADMIN, HEALTH_WORKER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsNotificationCreateRequest'
      responses:
        '201':
          description: Notification created and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsNotification'
        '400':
          description: Validation error
        '404':
          description: Caregiver, patient, or schedule slot not found

  /api/v1/notifications/{id}/:
    get:
      tags: [Notifications]
      summary: Get notification detail
      description: |
        Returns the full SmsNotification record including the complete delivery
        attempt history (`attempts` array).

        **Roles:** ADMIN, HEALTH_WORKER
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: SmsNotification UUID
      responses:
        '200':
          description: Notification detail with attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsNotification'
        '404':
          description: Notification not found

  /api/v1/notifications/{id}/status/:
    put:
      tags: [Notifications]
      summary: Update notification delivery status
      description: |
        Updates the delivery status of a notification. Intended for:
        1. **Gateway webhook callbacks** — when the Android SMS Gateway app confirms
           delivery, it can call this endpoint to mark the notification as `delivered`.
        2. **Manual admin override** — e.g. to cancel a pending notification.

        Automatically sets `sent_at` when status becomes `sent`, and `delivered_at`
        when status becomes `delivered`.

        **Roles:** ADMIN only
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: SmsNotification UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryStatusUpdateRequest'
      responses:
        '200':
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsNotification'
        '400':
          description: Validation error
        '404':
          description: Notification not found

  /api/v1/notifications/templates/:
    get:
      tags: [Notifications]
      summary: List active message templates
      description: |
        Returns all active `MessageTemplate` records. Templates define the SMS text
        with `{placeholder}` variables for caregiver name, patient name, vaccine name,
        due date, and facility name.

        Supports optional filters:
        - `?message_type=reminder|missed_appointment|…`
        - `?language_code=en|am|or|…`

        **Roles:** ADMIN only
      parameters:
        - in: query
          name: message_type
          schema:
            type: string
            enum: [reminder, missed_appointment, outbreak_warning, welcome, manual]
          description: Filter by message type
        - in: query
          name: language_code
          schema:
            type: string
          description: Filter by language code (e.g. en, am, or)
          example: en
      responses:
        '200':
          description: List of active templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageTemplate'
        '403':
          description: Forbidden (ADMIN only)

  # ── Admin Dashboard ──────────────────────────────────────────────────────────
  /api/v1/analytics/admin-dashboard/:
    get:
      summary: Admin role home-screen metrics
      description: |
        Total patients, total users, active defaulter count and percentage, and a
        breakdown of users by role. Requires ADMIN role.
      tags: [Analytics]
      responses:
        '200':
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboard'
        '403':
          description: Forbidden (ADMIN only)

  # ── HW Dashboard ─────────────────────────────────────────────────────────────
  /api/v1/analytics/hw-dashboard/:
    get:
      summary: Health Worker role home-screen metrics
      description: |
        Patients at assigned facility, appointments due today, today's doses
        administered, defaulter count, and the first 20 defaulters with caregiver
        contact details. Requires HEALTH_WORKER or ADMIN role.
      tags: [Analytics]
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
          description: Report date (default today)
      responses:
        '200':
          description: Health worker dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HwDashboard'
        '403':
          description: Forbidden

  # ── PHO Dashboard ────────────────────────────────────────────────────────────
  /api/v1/analytics/pho-dashboard/:
    get:
      summary: Public Health Official role home-screen metrics
      description: |
        Total doses administered system-wide, active defaulters and percentage,
        and zero-dose children count. Requires PUBLIC_HEALTH_OFFICIAL or ADMIN role.
      tags: [Analytics]
      responses:
        '200':
          description: PHO dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoDashboard'
        '403':
          description: Forbidden

  # ── Daily Vaccination Report ─────────────────────────────────────────────────
  /api/v1/analytics/daily-report/:
    get:
      summary: Daily vaccination activity report
      description: |
        Doses administered on a given date, grouped by vaccine. Health workers see
        only their facility; admins may pass `facility` to scope the result.
        Requires HEALTH_WORKER or ADMIN role.
      tags: [Analytics]
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
          description: Report date (default today)
        - in: query
          name: facility
          schema:
            type: string
            format: uuid
          description: Filter to a specific facility (ADMIN only)
      responses:
        '200':
          description: Daily report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyVaccinationReport'
        '403':
          description: Forbidden

  # ── Defaulter list ───────────────────────────────────────────────────────────
  /api/v1/patients/defaulters/:
    get:
      summary: List patients with overdue or defaulter vaccination status
      description: |
        Returns patients whose immunization status is `overdue` or `defaulter`.
        Health workers see only patients at their assigned facility unless
        `all=true` is passed. Requires HEALTH_WORKER or ADMIN role.
      tags: [Patients]
      parameters:
        - in: query
          name: facility
          schema:
            type: string
            format: uuid
          description: Filter to a specific facility UUID
        - in: query
          name: all
          schema:
            type: string
            enum: ['true']
          description: Show all facilities (ADMIN only)
      responses:
        '200':
          description: List of defaulter patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DefaulterPatient'
        '403':
          description: Forbidden

  # ── Send manual reminder ──────────────────────────────────────────────────────
  /api/v1/patients/{id}/send-reminder:
    post:
      summary: Manually send an SMS reminder to a patient's caregiver
      description: |
        Queues an SMS notification of type `manual` to the patient's primary
        caregiver phone number. Uses the missed-appointment template or falls back
        to a plain message. A custom `message` body can be supplied. Requires
        HEALTH_WORKER or ADMIN role.
      tags: [Patients]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: Optional custom SMS body; overrides template
                  example: "Please bring your child to Bole HC for their overdue vaccines."
      responses:
        '201':
          description: Notification queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderQueued'
        '404':
          description: Patient not found
        '403':
          description: Forbidden

tags:
  - name: Authentication
    description: Login, token refresh, logout, and password management
  - name: Users
    description: User account management (ADMIN only)
  - name: Facilities
    description: Health facility registry
  - name: Geography
    description: Administrative unit hierarchy (region → zone → woreda → kebele)
  - name: Caregivers
    description: Patient guardian and caregiver contacts
  - name: Patients
    description: Patient registration and management
  - name: Patient Self-Service
    description: Endpoints for patients to view their own vaccination data (PATIENT role)
  - name: Caregiver Self-Service
    description: Endpoints for caregivers to view assigned patients' vaccination data (CAREGIVER role)
  - name: Immunization Schedule
    description: Per-patient vaccination schedule slots and dose recording
  - name: Vaccine Catalogue
    description: Antigens and vaccine product definitions
  - name: Vaccine Batches
    description: Vaccine lot tracking for cold-chain and pharmacovigilance
  - name: EPI Schedule
    description: National EPI schedule versions and per-vaccine dose rules
  - name: Surveillance
    description: AEFI and symptom reports with follow-up workflow
  - name: Outbreak Alerts
    description: Outbreak alert lifecycle management
  - name: Reports
    description: Async report generation (defaulters, coverage, AEFI)
  - name: Analytics
    description: |
      Vaccine coverage, performance analytics, and role-specific dashboards.
      - **Admin Dashboard** – total patients, users, defaulter %
      - **HW Dashboard** – facility patients, daily progress, defaulter list
      - **PHO Dashboard** – national totals, zero-dose children
      - **Daily Report** – doses administered today by vaccine
  - name: Offline Sync
    description: Device registration and offline data synchronisation (HEALTH_WORKER role)
  - name: Notifications
    description: |
      SMS notification management and message templates.
      Automated reminders (vaccines due today) and missed-appointment alerts are sent
      by Celery periodic tasks without human intervention.
      Manual notifications can be created via POST.
      Delivery status updates are accepted via PUT (used by the SMS gateway webhook).
