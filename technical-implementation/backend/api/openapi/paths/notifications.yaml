notifications:
  get:
    tags: [Notifications]
    summary: List notifications and reminder history
    description: >
      Returns queued, sent, delivered, or failed notifications. This endpoint supports
      audit trails, caregiver communication review, and operational monitoring of SMS
      reminder delivery.
    operationId: listNotifications
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/parameters/page.yaml
      - $ref: ../components/parameters/page-size.yaml
      - $ref: ../components/parameters/patient-id-query.yaml
      - $ref: ../components/parameters/notification-type.yaml
      - $ref: ../components/parameters/notification-status.yaml
    responses:
      "200":
        description: Notification history
        content:
          application/json:
            schema:
              $ref: ../components/schemas/notification-list-response.yaml
            examples:
              notificationHistory:
                summary: SMS notification history
                value:
                  items:
                    - id: notif-001
                      notificationType: appointment-reminder
                      channel: sms
                      templateCode: epi-reminder-am
                      patientId: patient-123
                      caregiverId: caregiver-001
                      recipientPhoneNumber: "+251900000001"
                      language: am
                      deliveryStatus: delivered
                      dispatchMode: queued
                      messageBody: Lidya Tesfaye has Pentavalent dose 1 due on 02 Jan 2026 at Bole Health Center.
                      retryCount: 0
                      dispatchedAt: "2026-01-01T06:00:00Z"
                  page: 1
                  pageSize: 20
                  total: 1
      "401":
        $ref: ../components/responses/unauthorized.yaml
  post:
    tags: [Notifications]
    summary: Create and dispatch a notification request
    description: >
      Creates a notification record and queues it for dispatch. This endpoint supports
      appointment reminders, missed-dose alerts, and outbreak alerts sent through the
      SMS channel.
    operationId: createNotification
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/notification-create-request.yaml
          examples:
            missedDoseAlert:
              summary: Missed-dose SMS alert
              value:
                notificationType: missed-dose-alert
                channel: sms
                templateCode: missed-dose-am
                patientId: patient-123
                caregiverId: caregiver-001
                recipientPhoneNumber: "+251900000001"
                language: am
                dispatchMode: queued
                messageBody: Lidya Tesfaye missed Pentavalent dose 1. Please visit Bole Health Center as soon as possible.
    responses:
      "201":
        description: Notification created
        content:
          application/json:
            schema:
              $ref: ../components/schemas/notification.yaml
            examples:
              createdNotification:
                summary: Queued missed-dose alert
                value:
                  id: notif-002
                  notificationType: missed-dose-alert
                  channel: sms
                  templateCode: missed-dose-am
                  patientId: patient-123
                  caregiverId: caregiver-001
                  recipientPhoneNumber: "+251900000001"
                  language: am
                  deliveryStatus: queued
                  dispatchMode: queued
                  messageBody: Lidya Tesfaye missed Pentavalent dose 1. Please visit Bole Health Center as soon as possible.
                  retryCount: 0
                  dispatchedAt: "2026-04-09T11:30:00Z"
      "400":
        $ref: ../components/responses/bad-request.yaml
      "401":
        $ref: ../components/responses/unauthorized.yaml
