patientSchedule:
  get:
    tags: [Immunization]
    summary: Get a patient's vaccination schedule
    description: >
      Returns the generated immunization schedule for a registered child based on the
      Ethiopian EPI schedule. The response is intended to drive the child detail page,
      upcoming appointments list, and due or overdue reminders in the web client.
    operationId: getPatientSchedule
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/parameters/patient-id.yaml
      - $ref: ../components/parameters/include-completed.yaml
    responses:
      "200":
        description: Vaccination schedule
        content:
          application/json:
            schema:
              $ref: ../components/schemas/vaccination-schedule.yaml
            examples:
              bolePatientSchedule:
                summary: Schedule for a child registered in Addis Ababa
                value:
                  patientId: patient-123
                  scheduleVersion: ETH-EPI-2025
                  generatedAt: "2026-04-09T09:15:00Z"
                  items:
                    - code: bcg-0
                      vaccineCode: BCG
                      antigenGroup: tuberculosis
                      label: BCG at birth
                      doseNumber: 0
                      recommendedAgeWeeks: 0
                      dueDate: "2025-11-21"
                      status: administered
                    - code: opv-0
                      vaccineCode: OPV0
                      antigenGroup: polio
                      label: Oral polio vaccine at birth
                      doseNumber: 0
                      recommendedAgeWeeks: 0
                      dueDate: "2025-11-21"
                      status: administered
                    - code: penta-1
                      vaccineCode: PENTA1
                      antigenGroup: pentavalent
                      label: Pentavalent dose 1
                      doseNumber: 1
                      recommendedAgeWeeks: 6
                      dueDate: "2026-01-02"
                      status: due
                    - code: pcv-1
                      vaccineCode: PCV1
                      antigenGroup: pneumococcal
                      label: Pneumococcal conjugate vaccine dose 1
                      doseNumber: 1
                      recommendedAgeWeeks: 6
                      dueDate: "2026-01-02"
                      status: scheduled
      "401":
        $ref: ../components/responses/unauthorized.yaml
      "404":
        $ref: ../components/responses/not-found.yaml

patientImmunizations:
  post:
    tags: [Immunization]
    summary: Record an administered vaccine dose
    description: >
      Records a completed immunization event for a given patient schedule item. The
      payload captures the administered antigen, administration metadata, and the
      facility and user that recorded the dose.
    operationId: recordImmunization
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/parameters/patient-id.yaml
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/immunization-event-create-request.yaml
          examples:
            recordPentaDose:
              summary: Record Pentavalent dose 1 at Bole Health Center
              value:
                scheduleCode: penta-1
                vaccineCode: PENTA1
                batchNumber: ETH-PENTA-2401
                administeredAt: "2026-01-02T09:45:00Z"
                facilityCode: AA-BOLE-HC-001
                administeredByUserId: user-001
                route: intramuscular
                site: left-thigh
                source: routine
                notes: Child arrived on scheduled appointment date.
    responses:
      "201":
        description: Immunization event recorded
        content:
          application/json:
            schema:
              $ref: ../components/schemas/immunization-event.yaml
            examples:
              immunizationRecorded:
                summary: Recorded Pentavalent dose event
                value:
                  id: imm-001
                  patientId: patient-123
                  scheduleCode: penta-1
                  vaccineCode: PENTA1
                  batchNumber: ETH-PENTA-2401
                  administeredAt: "2026-01-02T09:45:00Z"
                  recordedAt: "2026-01-02T09:46:08Z"
                  facilityCode: AA-BOLE-HC-001
                  administeredByUserId: user-001
                  route: intramuscular
                  site: left-thigh
                  source: routine
                  notes: Child arrived on scheduled appointment date.
      "400":
        $ref: ../components/responses/bad-request.yaml
      "401":
        $ref: ../components/responses/unauthorized.yaml
      "409":
        $ref: ../components/responses/state-conflict.yaml
      "404":
        $ref: ../components/responses/not-found.yaml
