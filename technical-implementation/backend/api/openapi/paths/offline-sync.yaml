devices:
  post:
    tags: [Offline Sync]
    summary: Register a field device for offline use
    description: >
      Registers a device used by a health worker for offline data capture. Device
      registration links the device to a user and facility and prepares it for later
      synchronization.
    operationId: registerDevice
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/device-registration-request.yaml
          examples:
            androidTablet:
              summary: Register a field tablet
              value:
                deviceId: samsung-tab-a9-001
                deviceName: Bole outreach tablet 1
                deviceType: tablet
                healthWorkerId: user-001
                facilityCode: AA-BOLE-HC-001
                appVersion: 0.1.0
    responses:
      "201":
        description: Device registered
        content:
          application/json:
            schema:
              $ref: ../components/schemas/device-registration.yaml
            examples:
              registeredTablet:
                summary: Registered field tablet
                value:
                  id: device-reg-001
                  deviceId: samsung-tab-a9-001
                  deviceName: Bole outreach tablet 1
                  deviceType: tablet
                  healthWorkerId: user-001
                  facilityCode: AA-BOLE-HC-001
                  status: active
                  registeredAt: "2026-04-09T10:55:00Z"
                  lastSeenAt: "2026-04-09T11:00:00Z"
      "400":
        $ref: ../components/responses/bad-request.yaml
      "401":
        $ref: ../components/responses/unauthorized.yaml

syncBatches:
  post:
    tags: [Offline Sync]
    summary: Submit an offline sync batch
    description: >
      Submits a batch of offline transactions captured on a field device. The central
      server validates the batch, records the payload, and returns processing status.
    operationId: createSyncBatch
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/sync-batch-create-request.yaml
          examples:
            mixedSyncBatch:
              summary: Batch containing registration and immunization transactions
              value:
                deviceId: samsung-tab-a9-001
                submittedAt: "2026-04-09T11:00:00Z"
                entityType: mixed
                itemCount: 2
                items:
                  - localId: local-reg-001
                    entityType: patient-registration
                    operation: create
                    occurredAt: "2026-04-09T09:10:00Z"
                  - localId: local-imm-001
                    entityType: immunization-event
                    operation: create
                    occurredAt: "2026-04-09T09:30:00Z"
    responses:
      "202":
        description: Sync batch accepted
        content:
          application/json:
            schema:
              $ref: ../components/schemas/sync-batch.yaml
            examples:
              acceptedBatch:
                summary: Accepted mixed offline sync batch
                value:
                  batchId: batch-001
                  deviceId: samsung-tab-a9-001
                  status: received
                  acceptedCount: 0
                  rejectedCount: 0
                  conflicts: []
                  receivedAt: "2026-04-09T11:00:10Z"
      "400":
        $ref: ../components/responses/bad-request.yaml
      "401":
        $ref: ../components/responses/unauthorized.yaml

syncBatchById:
  get:
    tags: [Offline Sync]
    summary: Get sync batch status
    description: >
      Returns the processing result for a submitted sync batch, including accepted and
      rejected transaction counts and any detected conflicts.
    operationId: getSyncBatchById
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/parameters/batch-id.yaml
    responses:
      "200":
        description: Sync batch details
        content:
          application/json:
            schema:
              $ref: ../components/schemas/sync-batch.yaml
            examples:
              completedBatch:
                summary: Processed offline sync batch
                value:
                  batchId: batch-001
                  deviceId: samsung-tab-a9-001
                  status: completed
                  acceptedCount: 2
                  rejectedCount: 0
                  conflicts: []
                  receivedAt: "2026-04-09T11:00:10Z"
      "401":
        $ref: ../components/responses/unauthorized.yaml
      "404":
        $ref: ../components/responses/not-found.yaml
