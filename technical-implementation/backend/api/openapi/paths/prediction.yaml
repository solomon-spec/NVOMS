predictionRuns:
  post:
    tags: [Prediction]
    summary: Start a prediction run
    description: >
      Starts a batch prediction run for a selected disease and scope. The run produces
      risk scores and alerts for administrative areas using the configured model and
      the latest available health and environmental features.
    operationId: createPredictionRun
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/prediction-run-create-request.yaml
          examples:
            measlesRiskRun:
              summary: Measles risk run for Oromia and Somali
              value:
                runType: batch
                disease: measles
                modelCode: xgboost-measles-v1
                asOfDate: "2026-04-09"
                scopeLevel: region
                regionCodes: [OR, SO]
                requestedByUserId: user-ph-001
    responses:
      "202":
        description: Prediction run accepted
        content:
          application/json:
            schema:
              $ref: ../components/schemas/prediction-run.yaml
            examples:
              acceptedRun:
                summary: Accepted measles prediction run
                value:
                  id: run-001
                  runType: batch
                  disease: measles
                  modelCode: xgboost-measles-v1
                  scopeLevel: region
                  status: queued
                  asOfDate: "2026-04-09"
                  requestedByUserId: user-ph-001
                  createdAt: "2026-04-09T09:25:00Z"
      "400":
        $ref: ../components/responses/bad-request.yaml
      "401":
        $ref: ../components/responses/unauthorized.yaml

predictionScores:
  get:
    tags: [Prediction]
    summary: List risk scores by area
    description: >
      Returns the latest prediction scores for the selected disease and area filters.
      This endpoint supports dashboard map layers, hotspot views, and silent district
      review.
    operationId: listPredictionScores
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/parameters/page.yaml
      - $ref: ../components/parameters/page-size.yaml
      - $ref: ../components/parameters/disease.yaml
      - $ref: ../components/parameters/region-code.yaml
      - $ref: ../components/parameters/risk-level.yaml
      - $ref: ../components/parameters/as-of-date.yaml
    responses:
      "200":
        description: Prediction scores
        content:
          application/json:
            schema:
              $ref: ../components/schemas/prediction-score-list-response.yaml
            examples:
              measlesScores:
                summary: Regional measles risk scores
                value:
                  items:
                    - id: score-001
                      disease: measles
                      areaLevel: region
                      areaCode: SO
                      areaLabel: Somali
                      riskScore: 0.89
                      riskLevel: critical
                      confidence: 0.81
                      silentDistrict: true
                      drivers:
                        - low measles coverage
                        - high zero-dose burden
                        - surveillance silence
                      modelVersion: xgboost-measles-v1
                      generatedAt: "2026-04-09T09:30:00Z"
                  page: 1
                  pageSize: 20
                  total: 1
      "401":
        $ref: ../components/responses/unauthorized.yaml

predictionAlerts:
  get:
    tags: [Prediction]
    summary: List outbreak alerts
    description: >
      Returns operational outbreak alerts derived from prediction scores and alerting
      rules. Alerts support escalation, acknowledgement, and targeted response.
    operationId: listPredictionAlerts
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/parameters/page.yaml
      - $ref: ../components/parameters/page-size.yaml
      - $ref: ../components/parameters/disease.yaml
      - $ref: ../components/parameters/risk-level.yaml
      - $ref: ../components/parameters/region-code.yaml
    responses:
      "200":
        description: Outbreak alerts
        content:
          application/json:
            schema:
              $ref: ../components/schemas/outbreak-alert-list-response.yaml
            examples:
              alertList:
                summary: Active outbreak alerts
                value:
                  items:
                    - id: alert-001
                      disease: measles
                      areaLevel: region
                      areaCode: SO
                      areaLabel: Somali
                      riskLevel: critical
                      riskScore: 0.89
                      alertStatus: open
                      recommendedAction: Verify field reports and prioritize supplemental outreach in silent districts.
                      generatedAt: "2026-04-09T09:35:00Z"
                  page: 1
                  pageSize: 20
                  total: 1
      "401":
        $ref: ../components/responses/unauthorized.yaml
