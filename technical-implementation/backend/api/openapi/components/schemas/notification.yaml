type: object
required:
  - id
  - notificationType
  - channel
  - templateCode
  - recipientPhoneNumber
  - language
  - deliveryStatus
  - dispatchMode
  - messageBody
  - dispatchedAt
properties:
  id:
    type: string
    example: notif-001
  notificationType:
    type: string
    example: appointment-reminder
  channel:
    type: string
    example: sms
  templateCode:
    type: string
    example: epi-reminder-am
  patientId:
    type: string
    example: patient-123
  caregiverId:
    type: string
    example: caregiver-001
  recipientPhoneNumber:
    type: string
    example: "+251900000001"
  language:
    type: string
    example: am
  deliveryStatus:
    type: string
    enum: [queued, sent, delivered, failed]
    example: delivered
  dispatchMode:
    type: string
    example: queued
  messageBody:
    type: string
    example: Lidya Tesfaye has Pentavalent dose 1 due on 02 Jan 2026 at Bole Health Center.
  retryCount:
    type: integer
    example: 0
  dispatchedAt:
    type: string
    format: date-time
    example: "2026-01-01T06:00:00Z"
