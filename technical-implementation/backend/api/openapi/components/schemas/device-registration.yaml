type: object
required: [id, deviceId, deviceName, deviceType, healthWorkerId, facilityCode, status, registeredAt]
properties:
  id:
    type: string
    example: device-reg-001
  deviceId:
    type: string
    example: samsung-tab-a9-001
  deviceName:
    type: string
    example: Bole outreach tablet 1
  deviceType:
    type: string
    example: tablet
  healthWorkerId:
    type: string
    example: user-001
  facilityCode:
    type: string
    example: AA-BOLE-HC-001
  status:
    type: string
    enum: [active, blocked, retired]
    example: active
  registeredAt:
    type: string
    format: date-time
    example: "2026-04-09T10:55:00Z"
  lastSeenAt:
    type: string
    format: date-time
    example: "2026-04-09T11:00:00Z"
