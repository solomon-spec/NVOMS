type: object
required:
  - id
  - patientId
  - scheduleCode
  - vaccineCode
  - administeredAt
  - recordedAt
  - facilityCode
  - administeredByUserId
  - route
  - site
  - source
properties:
  id:
    type: string
    example: imm-001
  patientId:
    type: string
    example: patient-123
  scheduleCode:
    type: string
    example: penta-1
  vaccineCode:
    type: string
    example: PENTA1
  batchNumber:
    type: string
    example: ETH-PENTA-2401
  administeredAt:
    type: string
    format: date-time
    example: "2026-01-02T09:45:00Z"
  recordedAt:
    type: string
    format: date-time
    example: "2026-01-02T09:46:08Z"
  facilityCode:
    type: string
    example: AA-BOLE-HC-001
  administeredByUserId:
    type: string
    example: user-001
  route:
    type: string
    example: intramuscular
  site:
    type: string
    example: left-thigh
  source:
    type: string
    example: routine
  notes:
    type: string
    example: Child arrived on scheduled appointment date.
