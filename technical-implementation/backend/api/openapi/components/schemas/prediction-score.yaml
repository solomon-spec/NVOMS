type: object
required:
  - id
  - disease
  - areaLevel
  - areaCode
  - areaLabel
  - riskScore
  - riskLevel
  - confidence
  - silentDistrict
  - drivers
  - modelVersion
  - generatedAt
properties:
  id:
    type: string
    example: score-001
  disease:
    type: string
    example: measles
  areaLevel:
    type: string
    enum: [region, woreda]
    example: region
  areaCode:
    type: string
    example: SO
  areaLabel:
    type: string
    example: Somali
  riskScore:
    type: number
    format: float
    example: 0.89
  riskLevel:
    type: string
    enum: [low, medium, high, critical]
    example: critical
  confidence:
    type: number
    format: float
    example: 0.81
  silentDistrict:
    type: boolean
    example: true
  drivers:
    type: array
    items:
      type: string
    example: [low measles coverage, high zero-dose burden, surveillance silence]
  modelVersion:
    type: string
    example: xgboost-measles-v1
  generatedAt:
    type: string
    format: date-time
    example: "2026-04-09T09:30:00Z"
