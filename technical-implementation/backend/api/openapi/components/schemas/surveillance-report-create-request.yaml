type: object
required:
  - reportType
  - observedAt
  - facilityCode
  - reportedByUserId
  - symptoms
  - followUpRequired
  - followUpStatus
properties:
  reportType:
    type: string
    enum: [afp, measles-suspected, cholera-suspected, aefi, zero-dose-follow-up]
    example: measles-suspected
  observedAt:
    type: string
    format: date-time
    example: "2026-04-09T10:20:00Z"
  facilityCode:
    type: string
    example: AA-BOLE-HC-001
  reportedByUserId:
    type: string
    example: user-001
  conditionStatus:
    type: string
    enum: [suspected, confirmed, ruled-out]
    example: suspected
  symptoms:
    type: array
    items:
      $ref: ./symptom-observation.yaml
  followUpRequired:
    type: boolean
    example: true
  followUpStatus:
    type: string
    enum: [open, in-progress, closed]
    example: open
  notes:
    type: string
    example: Child presented with fever and generalized rash during routine visit.
