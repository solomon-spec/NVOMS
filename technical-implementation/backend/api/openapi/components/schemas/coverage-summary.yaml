type: object
required: [scope, summary, coverageByAntigen, generatedAt]
properties:
  scope:
    type: object
    required: [level, label, asOfDate]
    properties:
      level:
        type: string
        enum: [national, region, facility]
        example: region
      regionCode:
        type: string
        example: AA
      facilityCode:
        type: string
        example: AA-BOLE-HC-001
      label:
        type: string
        example: Addis Ababa
      asOfDate:
        type: string
        format: date
        example: "2026-04-09"
  summary:
    type: object
    required:
      - totalRegisteredChildren
      - fullyImmunizedChildren
      - dueToday
      - overdue
      - zeroDose
      - coverageRate
      - dropoutRatePentavalent1ToMeasles1
    properties:
      totalRegisteredChildren:
        type: integer
        example: 1240
      fullyImmunizedChildren:
        type: integer
        example: 1048
      dueToday:
        type: integer
        example: 36
      overdue:
        type: integer
        example: 91
      zeroDose:
        type: integer
        example: 28
      coverageRate:
        type: number
        format: float
        example: 84.5
      dropoutRatePentavalent1ToMeasles1:
        type: number
        format: float
        example: 7.2
  coverageByAntigen:
    type: array
    items:
      $ref: ./coverage-summary-antigen-item.yaml
  generatedAt:
    type: string
    format: date-time
    example: "2026-04-09T09:00:00Z"
