type: object
required: [id, targetSystem, jobType, status, submittedAt]
properties:
  id:
    type: string
    example: job-001
  targetSystem:
    type: string
    enum: [fhir, dhis2]
    example: dhis2
  jobType:
    type: string
    enum: [export, sync]
    example: sync
  status:
    type: string
    enum: [queued, running, completed, failed]
    example: completed
  submittedAt:
    type: string
    format: date-time
    example: "2026-04-09T10:00:00Z"
  completedAt:
    type: string
    format: date-time
    example: "2026-04-09T10:03:20Z"
  recordsProcessed:
    type: integer
    example: 128
  successCount:
    type: integer
    example: 126
  errorCount:
    type: integer
    example: 2
  lastError:
    type: string
    example: Two records were rejected because of missing org unit mappings.
