type: object
required: [accessToken, refreshToken, tokenType, expiresIn]
properties:
  accessToken:
    type: string
    example: access-token-ethiopia-demo
  refreshToken:
    type: string
    example: refresh-token-ethiopia-demo
  tokenType:
    type: string
    example: Bearer
  expiresIn:
    type: integer
    description: Access token lifetime in seconds
    example: 3600
