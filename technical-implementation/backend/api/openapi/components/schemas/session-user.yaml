type: object
required: [id, email, role, displayName]
properties:
  id:
    type: string
    example: user-001
  email:
    type: string
    format: email
    example: selamawit.bekele@ethiopia-example.org
  role:
    type: string
    enum: [administrator, health-worker, public-health-official]
    example: health-worker
  displayName:
    type: string
    example: Selamawit Bekele
  facilityCode:
    type: string
    example: AA-BOLE-HC-001
