type: object
required:
  - id
  - uid
  - givenName
  - familyName
  - sex
  - dateOfBirth
  - caregiver
  - createdAt
properties:
  id:
    type: string
    example: patient-123
  uid:
    type: string
    example: ETH-AA-2025-000123
  givenName:
    type: string
    example: Lidya
  familyName:
    type: string
    example: Tesfaye
  sex:
    type: string
    enum: [female, male]
    example: female
  dateOfBirth:
    type: string
    format: date
    example: "2025-11-21"
  birthPlace:
    type: string
    example: Bole, Addis Ababa
  caregiver:
    $ref: ./caregiver.yaml
  regionCode:
    type: string
    example: AA
  facilityCode:
    type: string
    example: AA-BOLE-HC-001
  immunizationStatus:
    type: string
    enum: [scheduled, due, overdue, defaulter, fully-immunized]
    example: due
  createdAt:
    type: string
    format: date-time
    example: "2026-04-09T08:30:00Z"
