type: object
required: [datasetCode, period, scopeLevel, requestedByUserId]
properties:
  datasetCode:
    type: string
    example: EPI_MONTHLY_COVERAGE
  period:
    type: string
    example: "2026-03"
  scopeLevel:
    type: string
    enum: [national, region, facility]
    example: region
  regionCode:
    type: string
    example: AA
  facilityCode:
    type: string
    example: AA-BOLE-HC-001
  requestedByUserId:
    type: string
    example: user-admin-001
