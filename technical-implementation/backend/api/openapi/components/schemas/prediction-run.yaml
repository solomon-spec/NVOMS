type: object
required: [id, runType, disease, modelCode, scopeLevel, status, asOfDate, requestedByUserId, createdAt]
properties:
  id:
    type: string
    example: run-001
  runType:
    type: string
    example: batch
  disease:
    type: string
    example: measles
  modelCode:
    type: string
    example: xgboost-measles-v1
  scopeLevel:
    type: string
    example: region
  status:
    type: string
    enum: [queued, running, completed, failed]
    example: queued
  asOfDate:
    type: string
    format: date
    example: "2026-04-09"
  requestedByUserId:
    type: string
    example: user-ph-001
  createdAt:
    type: string
    format: date-time
    example: "2026-04-09T09:25:00Z"
  completedAt:
    type: string
    format: date-time
    example: "2026-04-09T09:29:30Z"
