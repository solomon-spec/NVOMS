type: object
required: [code, vaccineCode, antigenGroup, label, doseNumber, recommendedAgeWeeks, dueDate, status]
properties:
  code:
    type: string
    example: penta-1
  vaccineCode:
    type: string
    example: PENTA1
  antigenGroup:
    type: string
    example: pentavalent
  label:
    type: string
    example: Pentavalent dose 1
  doseNumber:
    type: integer
    example: 1
  recommendedAgeWeeks:
    type: integer
    example: 6
  dueDate:
    type: string
    format: date
    example: "2026-01-02"
  status:
    type: string
    enum: [scheduled, due, overdue, administered]
    example: due
