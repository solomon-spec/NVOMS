type: object
required: [vaccineCode, label, targetChildren, administeredChildren, coverageRate]
properties:
  vaccineCode:
    type: string
    example: PENTA3
  label:
    type: string
    example: Pentavalent dose 3
  targetChildren:
    type: integer
    example: 1240
  administeredChildren:
    type: integer
    example: 1076
  coverageRate:
    type: number
    format: float
    example: 86.8
