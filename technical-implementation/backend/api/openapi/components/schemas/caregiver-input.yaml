type: object
required: [givenName, familyName, phoneNumber, relationship]
properties:
  givenName:
    type: string
    minLength: 1
    example: Mekdes
  familyName:
    type: string
    minLength: 1
    example: Alemu
  phoneNumber:
    type: string
    minLength: 7
    example: "+251900000001"
  relationship:
    type: string
    example: mother
  preferredLanguage:
    type: string
    enum: [am, en, om]
    example: am
