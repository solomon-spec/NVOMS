type: object
required: [scheduleCode, vaccineCode, administeredAt, facilityCode, administeredByUserId, route, site, source]
properties:
  scheduleCode:
    type: string
    example: penta-1
  vaccineCode:
    type: string
    example: PENTA1
  batchNumber:
    type: string
    example: ETH-PENTA-2401
  administeredAt:
    type: string
    format: date-time
    example: "2026-01-02T09:45:00Z"
  facilityCode:
    type: string
    example: AA-BOLE-HC-001
  administeredByUserId:
    type: string
    example: user-001
  route:
    type: string
    enum: [intramuscular, oral, subcutaneous, intradermal]
    example: intramuscular
  site:
    type: string
    example: left-thigh
  source:
    type: string
    enum: [routine, outreach, campaign]
    example: routine
  notes:
    type: string
    example: Child arrived on scheduled appointment date.
