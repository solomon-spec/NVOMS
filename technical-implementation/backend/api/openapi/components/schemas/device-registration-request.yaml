type: object
required: [deviceId, deviceName, deviceType, healthWorkerId, facilityCode, appVersion]
properties:
  deviceId:
    type: string
    example: samsung-tab-a9-001
  deviceName:
    type: string
    example: Bole outreach tablet 1
  deviceType:
    type: string
    enum: [tablet, android-phone, browser]
    example: tablet
  healthWorkerId:
    type: string
    example: user-001
  facilityCode:
    type: string
    example: AA-BOLE-HC-001
  appVersion:
    type: string
    example: 0.1.0
