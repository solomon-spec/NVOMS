components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    login-request:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User login email
          example: selamawit.bekele@ethiopia-example.org
        password:
          type: string
          minLength: 8
          description: Plain text password entered by the user
          example: securepass123
    session-user:
      type: object
      required:
        - id
        - email
        - role
        - displayName
      properties:
        id:
          type: string
          example: user-001
        email:
          type: string
          format: email
          example: selamawit.bekele@ethiopia-example.org
        role:
          type: string
          enum:
            - administrator
            - health-worker
            - public-health-official
          example: health-worker
        displayName:
          type: string
          example: Selamawit Bekele
        facilityCode:
          type: string
          example: AA-BOLE-HC-001
    token-pair:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
          example: access-token-ethiopia-demo
        refreshToken:
          type: string
          example: refresh-token-ethiopia-demo
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: Access token lifetime in seconds
          example: 3600
    login-response:
      type: object
      required:
        - user
        - tokens
      properties:
        user:
          $ref: '#/components/schemas/session-user'
        tokens:
          $ref: '#/components/schemas/token-pair'
    api-error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: RESOURCE_NOT_FOUND
            message:
              type: string
              example: The requested resource could not be found.
            details:
              description: Optional machine-readable error details
    refresh-token-request:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          minLength: 1
          example: refresh-token-ethiopia-demo
    caregiver:
      type: object
      required:
        - id
        - givenName
        - familyName
        - phoneNumber
        - relationship
      properties:
        id:
          type: string
          example: caregiver-001
        givenName:
          type: string
          example: Mekdes
        familyName:
          type: string
          example: Alemu
        phoneNumber:
          type: string
          example: '+251900000001'
        relationship:
          type: string
          example: mother
        preferredLanguage:
          type: string
          enum:
            - am
            - en
            - om
          example: am
    patient:
      type: object
      required:
        - id
        - uid
        - givenName
        - familyName
        - sex
        - dateOfBirth
        - caregiver
        - createdAt
      properties:
        id:
          type: string
          example: patient-123
        uid:
          type: string
          example: ETH-AA-2025-000123
        givenName:
          type: string
          example: Lidya
        familyName:
          type: string
          example: Tesfaye
        sex:
          type: string
          enum:
            - female
            - male
          example: female
        dateOfBirth:
          type: string
          format: date
          example: '2025-11-21'
        birthPlace:
          type: string
          example: Bole, Addis Ababa
        caregiver:
          $ref: '#/components/schemas/caregiver'
        regionCode:
          type: string
          example: AA
        facilityCode:
          type: string
          example: AA-BOLE-HC-001
        immunizationStatus:
          type: string
          enum:
            - scheduled
            - due
            - overdue
            - defaulter
            - fully-immunized
          example: due
        createdAt:
          type: string
          format: date-time
          example: '2026-04-09T08:30:00Z'
    patient-list-response:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/patient'
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        total:
          type: integer
          example: 1
    caregiver-input:
      type: object
      required:
        - givenName
        - familyName
        - phoneNumber
        - relationship
      properties:
        givenName:
          type: string
          minLength: 1
          example: Mekdes
        familyName:
          type: string
          minLength: 1
          example: Alemu
        phoneNumber:
          type: string
          minLength: 7
