  responses:
    bad-request:
      description: The request could not be processed because validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/api-error'
          example:
            error:
              code: REQUEST_VALIDATION_FAILED
              message: Request validation failed.
              details:
                field: dateOfBirth
    invalid-credentials:
      description: The supplied login credentials were rejected.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/api-error'
          example:
            error:
              code: AUTH_INVALID_CREDENTIALS
              message: The provided email or password is incorrect.
    unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/api-error'
          example:
            error:
              code: AUTH_UNAUTHORIZED
              message: Authentication is required for this endpoint.
    duplicate-patient:
      description: A potential duplicate patient was detected.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/api-error'
          example:
            error:
              code: REGISTRY_DUPLICATE_PATIENT_SUSPECTED
              message: A patient with closely matching details already exists.
              details:
                matchedPatientId: patient-120
    not-found:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/api-error'
          example:
            error:
              code: RESOURCE_NOT_FOUND
              message: The requested resource could not be found.
    state-conflict:
      description: The requested change conflicts with the current vaccination schedule state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/api-error'
          example:
            error:
              code: IMMUNIZATION_STATE_CONFLICT
              message: The selected schedule item has already been recorded as administered.
              details:
                scheduleCode: penta-1
  parameters:
    search:
      name: search
      in: query
      required: false
      description: Search by patient given name, family name, or generated UID
      schema:
        type: string
        minLength: 1
        example: Lidya
    page:
      name: page
      in: query
      required: false
      description: One-based page index
      schema:
        type: integer
        minimum: 1
        default: 1
        example: 1
    page-size:
      name: pageSize
      in: query
      required: false
      description: Number of records returned per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
        example: 20
    region-code:
      name: regionCode
      in: query
      required: false
      description: Filter patients by region code
      schema:
        type: string
        example: AA
    facility-code:
      name: facilityCode
      in: query
      required: false
      description: Filter patients by facility code
      schema:
        type: string
        example: AA-BOLE-HC-001
    patient-id:
      name: patientId
      in: path
      required: true
      description: Unique patient identifier
      schema:
        type: string
        example: patient-123
    include-completed:
      name: includeCompleted
      in: query
      required: false
      description: Whether already administered schedule items should be included in the response
      schema:
        type: boolean
        default: true
        example: true
    follow-up-status:
      name: followUpStatus
      in: query
      required: false
      description: Filter follow-up cases by current status
      schema:
        type: string
        enum:
          - open
          - in-progress
          - closed
        example: open
    report-id:
      name: reportId
      in: path
      required: true
      description: Generated report identifier
      schema:
        type: string
        example: report-001
    patient-id-query:
      name: patientId
      in: query
      required: false
      description: Filter by patient identifier
      schema:
        type: string
        example: patient-123
    notification-type:
      name: notificationType
      in: query
      required: false
      description: Filter notifications by message type
