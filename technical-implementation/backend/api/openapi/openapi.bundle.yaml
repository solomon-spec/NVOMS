openapi: 3.1.0
info:
  title: Vaccination and Outbreak Monitoring API
  version: 0.1.0
  license:
    name: UNLICENSED
    identifier: UNLICENSED
  description: |
    Current contract set for the project MVP and phase-two integration planning. This version documents authentication, registry, immunization, surveillance, notifications, analytics, prediction, reporting, interoperability, and offline synchronization workflows. Example payloads use Ethiopia-context sample data and are fictional.
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
servers:
  - url: http://127.0.0.1:3000/api/v1
    description: Local development
tags:
  - name: Auth
    description: Login and token refresh endpoints used by the web client and admin users
  - name: Registry
    description: Patient and caregiver registration, retrieval, and search
  - name: Immunization
    description: Vaccination schedules and dose recording
  - name: Surveillance
    description: Surveillance observations, follow-up cases, and field monitoring
  - name: Notifications
    description: Reminder, alert, and notification history workflows
  - name: Analytics
    description: Dashboard summary endpoints
  - name: Prediction
    description: Risk scoring, prediction runs, and outbreak alert endpoints
  - name: Reporting
    description: Report generation, retrieval, and export endpoints
  - name: Interoperability
    description: FHIR and DHIS2 exchange workflows
  - name: Offline Sync
    description: Device registration and offline synchronization workflows
paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate a user
      security: []
      description: |
        Authenticates an administrator, health worker, or public health official using email and password credentials. On success, the API returns the authenticated user profile together with an access token and refresh token pair.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/login-request'
            examples:
              healthWorkerLogin:
                summary: Health worker login
                value:
                  email: selamawit.bekele@ethiopia-example.org
                  password: securepass123
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/login-response'
              examples:
                loginSuccess:
                  summary: Successful login
                  value:
                    user:
                      id: user-001
                      email: selamawit.bekele@ethiopia-example.org
                      role: health-worker
                      displayName: Selamawit Bekele
                      facilityCode: AA-BOLE-HC-001
                    tokens:
                      accessToken: access-token-ethiopia-demo
                      refreshToken: refresh-token-ethiopia-demo
                      tokenType: Bearer
                      expiresIn: 3600
        '400':
          $ref: '#/components/responses/bad-request'
        '401':
          $ref: '#/components/responses/invalid-credentials'
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Exchange a refresh token for a new session token pair
      security: []
      description: |
        Accepts a valid refresh token and returns a fresh access token and refresh token pair. The client should call this endpoint when the access token expires.
      operationId: refreshSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/refresh-token-request'
            examples:
              refreshExample:
                summary: Refresh session
                value:
                  refreshToken: refresh-token-ethiopia-demo
      responses:
        '200':
          description: Refresh successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/login-response'
              examples:
                refreshSuccess:
                  summary: Successful refresh
                  value:
                    user:
                      id: user-001
                      email: selamawit.bekele@ethiopia-example.org
                      role: health-worker
                      displayName: Selamawit Bekele
                      facilityCode: AA-BOLE-HC-001
                    tokens:
                      accessToken: refreshed-access-token-ethiopia-demo
                      refreshToken: refreshed-refresh-token-ethiopia-demo
                      tokenType: Bearer
                      expiresIn: 3600
        '400':
          $ref: '#/components/responses/bad-request'
        '401':
          $ref: '#/components/responses/unauthorized'
  /patients:
    get:
      tags:
        - Registry
      summary: Search or list registered patients
      description: |
        Returns a paginated list of registered patients. This endpoint can be used as a plain list endpoint or filtered by name, UID, region, or facility for dashboard and registration workflows.
      operationId: searchPatients
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page-size'
        - $ref: '#/components/parameters/region-code'
        - $ref: '#/components/parameters/facility-code'
      responses:
        '200':
          description: Matching patients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/patient-list-response'
              examples:
                patientSearchResult:
                  summary: Search result with one patient
                  value:
                    items:
                      - id: patient-123
                        uid: ETH-AA-2025-000123
                        givenName: Lidya
                        familyName: Tesfaye
                        sex: female
                        dateOfBirth: '2025-11-21'
                        birthPlace: Bole, Addis Ababa
                        caregiver:
                          id: caregiver-001
                          givenName: Mekdes
                          familyName: Alemu
                          phoneNumber: '+251900000001'
                          relationship: mother
                          preferredLanguage: am
                        regionCode: AA
                        facilityCode: AA-BOLE-HC-001
                        immunizationStatus: due
                        createdAt: '2026-04-09T08:30:00Z'
                    page: 1
                    pageSize: 20
                    total: 1
        '401':
          $ref: '#/components/responses/unauthorized'
    post:
      tags:
        - Registry
      summary: Register a patient and primary caregiver
      description: |
        Registers a child together with a required primary caregiver. This endpoint is the entry point for the immunization journey and should create a persistent patient identity that later modules can reuse.
      operationId: registerPatient
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/patient-create-request'
            examples:
              registerPatientExample:
                summary: Register a child and caregiver
                value:
                  givenName: Lidya
                  familyName: Tesfaye
                  sex: female
                  dateOfBirth: '2025-11-21'
                  birthPlace: Bole, Addis Ababa
                  regionCode: AA
                  facilityCode: AA-BOLE-HC-001
                  caregiver:
                    givenName: Mekdes
                    familyName: Alemu
                    phoneNumber: '+251900000001'
                    relationship: mother
                    preferredLanguage: am
      responses:
        '201':
          description: Patient successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/patient'
              examples:
                patientCreated:
                  summary: Registered patient
                  value:
                    id: patient-123
                    uid: ETH-AA-2025-000123
                    givenName: Lidya
                    familyName: Tesfaye
                    sex: female
                    dateOfBirth: '2025-11-21'
                    birthPlace: Bole, Addis Ababa
                    caregiver:
                      id: caregiver-001
                      givenName: Mekdes
                      familyName: Alemu
                      phoneNumber: '+251900000001'
                      relationship: mother
                      preferredLanguage: am
                    regionCode: AA
                    facilityCode: AA-BOLE-HC-001
                    immunizationStatus: due
                    createdAt: '2026-04-09T08:30:00Z'
        '400':
          $ref: '#/components/responses/bad-request'
        '401':
          $ref: '#/components/responses/unauthorized'
        '409':
          $ref: '#/components/responses/duplicate-patient'
  /patients/{patientId}:
    get:
      tags:
        - Registry
      summary: Get a single patient by identifier
      description: |
        Returns the patient profile and linked caregiver details for the provided patient identifier.
      operationId: getPatientById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/patient-id'
      responses:
        '200':
          description: Patient found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/patient'
              examples:
                patientDetails:
                  summary: Detailed patient record
                  value:
                    id: patient-123
                    uid: ETH-AA-2025-000123
                    givenName: Lidya
                    familyName: Tesfaye
                    sex: female
                    dateOfBirth: '2025-11-21'
                    birthPlace: Bole, Addis Ababa
                    caregiver:
                      id: caregiver-001
                      givenName: Mekdes
                      familyName: Alemu
                      phoneNumber: '+251900000001'
                      relationship: mother
                      preferredLanguage: am
                    regionCode: AA
                    facilityCode: AA-BOLE-HC-001
                    immunizationStatus: due
                    createdAt: '2026-04-09T08:30:00Z'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not-found'
  /patients/{patientId}/schedule:
    get:
      tags:
        - Immunization
      summary: Get a patient's vaccination schedule
      description: |
        Returns the generated immunization schedule for a registered child based on the Ethiopian EPI schedule. The response is intended to drive the child detail page, upcoming appointments list, and due or overdue reminders in the web client.
      operationId: getPatientSchedule
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/patient-id'
        - $ref: '#/components/parameters/include-completed'
      responses:
        '200':
          description: Vaccination schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/vaccination-schedule'
              examples:
                bolePatientSchedule:
                  summary: Schedule for a child registered in Addis Ababa
                  value:
                    patientId: patient-123
                    scheduleVersion: ETH-EPI-2025
                    generatedAt: '2026-04-09T09:15:00Z'
                    items:
                      - code: bcg-0
                        vaccineCode: BCG
                        antigenGroup: tuberculosis
                        label: BCG at birth
                        doseNumber: 0
                        recommendedAgeWeeks: 0
                        dueDate: '2025-11-21'
                        status: administered
                      - code: opv-0
                        vaccineCode: OPV0
                        antigenGroup: polio
                        label: Oral polio vaccine at birth
                        doseNumber: 0
                        recommendedAgeWeeks: 0
                        dueDate: '2025-11-21'
                        status: administered
                      - code: penta-1
                        vaccineCode: PENTA1
                        antigenGroup: pentavalent
                        label: Pentavalent dose 1
                        doseNumber: 1
                        recommendedAgeWeeks: 6
                        dueDate: '2026-01-02'
                        status: due
                      - code: pcv-1
                        vaccineCode: PCV1
                        antigenGroup: pneumococcal
                        label: Pneumococcal conjugate vaccine dose 1
                        doseNumber: 1
                        recommendedAgeWeeks: 6
                        dueDate: '2026-01-02'
                        status: scheduled
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not-found'
  /patients/{patientId}/immunizations:
    post:
      tags:
        - Immunization
      summary: Record an administered vaccine dose
      description: |
        Records a completed immunization event for a given patient schedule item. The payload captures the administered antigen, administration metadata, and the facility and user that recorded the dose.
      operationId: recordImmunization
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/patient-id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/immunization-event-create-request'
            examples:
              recordPentaDose:
                summary: Record Pentavalent dose 1 at Bole Health Center
                value:
                  scheduleCode: penta-1
                  vaccineCode: PENTA1
                  batchNumber: ETH-PENTA-2401
                  administeredAt: '2026-01-02T09:45:00Z'
                  facilityCode: AA-BOLE-HC-001
                  administeredByUserId: user-001
                  route: intramuscular
                  site: left-thigh
                  source: routine
                  notes: Child arrived on scheduled appointment date.
      responses:
        '201':
          description: Immunization event recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immunization-event'
              examples:
                immunizationRecorded:
                  summary: Recorded Pentavalent dose event
                  value:
                    id: imm-001
                    patientId: patient-123
                    scheduleCode: penta-1
                    vaccineCode: PENTA1
                    batchNumber: ETH-PENTA-2401
                    administeredAt: '2026-01-02T09:45:00Z'
                    recordedAt: '2026-01-02T09:46:08Z'
                    facilityCode: AA-BOLE-HC-001
                    administeredByUserId: user-001
                    route: intramuscular
                    site: left-thigh
                    source: routine
                    notes: Child arrived on scheduled appointment date.
        '400':
          $ref: '#/components/responses/bad-request'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not-found'
        '409':
          $ref: '#/components/responses/state-conflict'
  /patients/{patientId}/surveillance-reports:
    post:
      tags:
        - Surveillance
      summary: Record a surveillance observation for a patient
      description: |
        Captures a surveillance observation linked to a registered patient. This endpoint supports symptom reporting, AEFI capture, suspected measles or cholera cases, and zero-dose or follow-up related observations from the field.
      operationId: createSurveillanceReport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/patient-id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/surveillance-report-create-request'
            examples:
              measlesSuspicion:
                summary: Suspected measles observation recorded in Addis Ababa
                value:
                  reportType: measles-suspected
                  observedAt: '2026-04-09T10:20:00Z'
                  facilityCode: AA-BOLE-HC-001
                  reportedByUserId: user-001
                  conditionStatus: suspected
                  symptoms:
                    - code: fever
                      label: Fever
                      present: true
                    - code: rash
                      label: Rash
                      present: true
                    - code: cough
                      label: Cough
                      present: true
                  followUpRequired: true
                  followUpStatus: open
                  notes: Child presented with fever and generalized rash during routine visit.
      responses:
        '201':
          description: Surveillance report created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/surveillance-report'
              examples:
                createdReport:
                  summary: Created surveillance report
                  value:
                    id: surv-001
                    patientId: patient-123
                    reportType: measles-suspected
                    observedAt: '2026-04-09T10:20:00Z'
                    facilityCode: AA-BOLE-HC-001
                    reportedByUserId: user-001
                    conditionStatus: suspected
                    symptoms:
                      - code: fever
                        label: Fever
                        present: true
                      - code: rash
                        label: Rash
                        present: true
                      - code: cough
                        label: Cough
                        present: true
                    followUpRequired: true
                    followUpStatus: open
                    notes: Child presented with fever and generalized rash during routine visit.
                    createdAt: '2026-04-09T10:21:02Z'
        '400':
          $ref: '#/components/responses/bad-request'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not-found'
  /surveillance/follow-up-cases:
    get:
      tags:
        - Surveillance
      summary: List follow-up cases requiring public health action
      description: |
        Returns patient-level follow-up cases generated from surveillance reports, zero-dose detection, and defaulter monitoring. This endpoint supports health worker outreach views and public health review workflows.
      operationId: listFollowUpCases
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page-size'
        - $ref: '#/components/parameters/region-code'
        - $ref: '#/components/parameters/facility-code'
        - $ref: '#/components/parameters/follow-up-status'
      responses:
        '200':
          description: Follow-up cases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/follow-up-case-list-response'
              examples:
                followUpList:
                  summary: Open follow-up cases
                  value:
                    items:
                      - caseId: followup-001
                        patientId: patient-123
                        patientUid: ETH-AA-2025-000123
                        patientName: Lidya Tesfaye
                        alertType: symptom-follow-up
                        regionCode: AA
                        facilityCode: AA-BOLE-HC-001
                        status: open
                        flaggedAt: '2026-04-09T10:21:02Z'
                      - caseId: followup-002
                        patientId: patient-250
                        patientUid: ETH-OR-2025-000250
                        patientName: Nahom Hailu
                        alertType: defaulter
                        regionCode: OR
                        facilityCode: OR-ADAMA-HC-004
                        status: in-progress
                        flaggedAt: '2026-04-08T14:10:00Z'
                    page: 1
                    pageSize: 20
                    total: 2
        '401':
          $ref: '#/components/responses/unauthorized'
  /surveillance/reports/{reportId}:
    get:
      tags:
        - Surveillance
      summary: Get a surveillance report by identifier
      description: |
        Returns the full surveillance report payload including symptom observations, follow-up state, and field notes.
      operationId: getSurveillanceReportById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/report-id'
      responses:
        '200':
          description: Surveillance report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/surveillance-report'
              examples:
                measlesReport:
                  summary: Full surveillance report record
                  value:
                    id: surv-001
                    patientId: patient-123
                    reportType: measles-suspected
                    observedAt: '2026-04-09T10:20:00Z'
                    facilityCode: AA-BOLE-HC-001
                    reportedByUserId: user-001
                    conditionStatus: suspected
                    symptoms:
                      - code: fever
                        label: Fever
                        present: true
                      - code: rash
                        label: Rash
                        present: true
                      - code: cough
                        label: Cough
                        present: true
                    followUpRequired: true
                    followUpStatus: open
                    notes: Child presented with fever and generalized rash during routine visit.
                    createdAt: '2026-04-09T10:21:02Z'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not-found'
  /notifications:
    get:
      tags:
        - Notifications
      summary: List notifications and reminder history
      description: |
        Returns queued, sent, delivered, or failed notifications. This endpoint supports audit trails, caregiver communication review, and operational monitoring of SMS reminder delivery.
      operationId: listNotifications
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page-size'
        - $ref: '#/components/parameters/patient-id-query'
        - $ref: '#/components/parameters/notification-type'
        - $ref: '#/components/parameters/notification-status'
      responses:
        '200':
          description: Notification history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notification-list-response'
              examples:
                notificationHistory:
                  summary: SMS notification history
                  value:
                    items:
                      - id: notif-001
                        notificationType: appointment-reminder
                        channel: sms
                        templateCode: epi-reminder-am
                        patientId: patient-123
                        caregiverId: caregiver-001
                        recipientPhoneNumber: '+251900000001'
                        language: am
                        deliveryStatus: delivered
                        dispatchMode: queued
                        messageBody: Lidya Tesfaye has Pentavalent dose 1 due on 02 Jan 2026 at Bole Health Center.
                        retryCount: 0
                        dispatchedAt: '2026-01-01T06:00:00Z'
                    page: 1
                    pageSize: 20
                    total: 1
        '401':
          $ref: '#/components/responses/unauthorized'
    post:
      tags:
        - Notifications
      summary: Create and dispatch a notification request
      description: |
        Creates a notification record and queues it for dispatch. This endpoint supports appointment reminders, missed-dose alerts, and outbreak alerts sent through the SMS channel.
      operationId: createNotification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/notification-create-request'
            examples:
              missedDoseAlert:
                summary: Missed-dose SMS alert
                value:
                  notificationType: missed-dose-alert
                  channel: sms
                  templateCode: missed-dose-am
                  patientId: patient-123
                  caregiverId: caregiver-001
                  recipientPhoneNumber: '+251900000001'
                  language: am
                  dispatchMode: queued
                  messageBody: Lidya Tesfaye missed Pentavalent dose 1. Please visit Bole Health Center as soon as possible.
      responses:
        '201':
          description: Notification created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notification'
              examples:
                createdNotification:
                  summary: Queued missed-dose alert
                  value:
                    id: notif-002
                    notificationType: missed-dose-alert
                    channel: sms
                    templateCode: missed-dose-am
                    patientId: patient-123
                    caregiverId: caregiver-001
                    recipientPhoneNumber: '+251900000001'
                    language: am
                    deliveryStatus: queued
                    dispatchMode: queued
                    messageBody: Lidya Tesfaye missed Pentavalent dose 1. Please visit Bole Health Center as soon as possible.
                    retryCount: 0
                    dispatchedAt: '2026-04-09T11:30:00Z'
        '400':
          $ref: '#/components/responses/bad-request'
        '401':
          $ref: '#/components/responses/unauthorized'
  /analytics/coverage-summary:
    get:
      tags:
        - Analytics
      summary: Get a dashboard-ready immunization coverage summary
      description: |
        Returns an aggregated immunization coverage summary for dashboard views. The endpoint supports national, regional, or facility-focused views and exposes both top-line KPI values and antigen-level coverage summaries.
      operationId: getCoverageSummary
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/region-code'
        - $ref: '#/components/parameters/facility-code'
        - $ref: '#/components/parameters/as-of-date'
      responses:
        '200':
          description: Coverage summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coverage-summary'
              examples:
                addisAbabaCoverage:
                  summary: Addis Ababa regional summary
                  value:
                    scope:
                      level: region
                      regionCode: AA
                      label: Addis Ababa
                      asOfDate: '2026-04-09'
                    summary:
                      totalRegisteredChildren: 1240
                      fullyImmunizedChildren: 1048
                      dueToday: 36
                      overdue: 91
                      zeroDose: 28
                      coverageRate: 84.5
                      dropoutRatePentavalent1ToMeasles1: 7.2
                    coverageByAntigen:
                      - vaccineCode: BCG
                        label: BCG
                        targetChildren: 1240
                        administeredChildren: 1182
                        coverageRate: 95.3
                      - vaccineCode: PENTA3
                        label: Pentavalent dose 3
                        targetChildren: 1240
                        administeredChildren: 1076
                        coverageRate: 86.8
                      - vaccineCode: MEASLES1
                        label: Measles dose 1
                        targetChildren: 1240
                        administeredChildren: 998
                        coverageRate: 80.5
                    generatedAt: '2026-04-09T09:00:00Z'
        '401':
          $ref: '#/components/responses/unauthorized'
  /predictions/runs:
    post:
      tags:
        - Prediction
      summary: Start a prediction run
      description: |
        Starts a batch prediction run for a selected disease and scope. The run produces risk scores and alerts for administrative areas using the configured model and the latest available health and environmental features.
      operationId: createPredictionRun
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/prediction-run-create-request'
            examples:
              measlesRiskRun:
                summary: Measles risk run for Oromia and Somali
                value:
                  runType: batch
                  disease: measles
                  modelCode: xgboost-measles-v1
                  asOfDate: '2026-04-09'
                  scopeLevel: region
                  regionCodes:
                    - OR
                    - SO
                  requestedByUserId: user-ph-001
      responses:
        '202':
          description: Prediction run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/prediction-run'
              examples:
                acceptedRun:
                  summary: Accepted measles prediction run
                  value:
                    id: run-001
                    runType: batch
                    disease: measles
                    modelCode: xgboost-measles-v1
                    scopeLevel: region
                    status: queued
                    asOfDate: '2026-04-09'
                    requestedByUserId: user-ph-001
                    createdAt: '2026-04-09T09:25:00Z'
        '400':
          $ref: '#/components/responses/bad-request'
        '401':
          $ref: '#/components/responses/unauthorized'
  /predictions/scores:
    get:
      tags:
        - Prediction
      summary: List risk scores by area
      description: |
        Returns the latest prediction scores for the selected disease and area filters. This endpoint supports dashboard map layers, hotspot views, and silent district review.
      operationId: listPredictionScores
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page-size'
        - $ref: '#/components/parameters/disease'
        - $ref: '#/components/parameters/region-code'
        - $ref: '#/components/parameters/risk-level'
        - $ref: '#/components/parameters/as-of-date'
      responses:
        '200':
          description: Prediction scores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/prediction-score-list-response'
              examples:
